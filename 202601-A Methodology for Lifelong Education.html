<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>평생교육방법론 모의시험</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #FAF7F2; --ink: #1A1A1A; --muted: #6B6B6B; --card: #FFFFFF;
    --border: #E8E2D5; --accent: #2E5C4F; --accent-soft: #E8F0EC;
    --correct: #16A34A; --correct-soft: #DCFCE7; --correct-strong: #15803D;
    --wrong: #DC2626; --wrong-soft: #FEE2E2; --wrong-strong: #B91C1C;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
  }
  html, body { background: var(--bg); color: var(--ink); font-family: 'IBM Plex Sans KR', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; overscroll-behavior-y: contain; }
  body { background-image: radial-gradient(circle at 10% 0%, rgba(46,92,79,0.04) 0%, transparent 40%), radial-gradient(circle at 90% 100%, rgba(220,38,38,0.03) 0%, transparent 40%); }
  .app { max-width: 560px; margin: 0 auto; padding: 24px 20px 40px; }
  header { margin-bottom: 24px; }
  .eyebrow { font-family: 'Gowun Dodum', serif; color: var(--accent); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-family: 'Gowun Dodum', serif; font-size: 24px; font-weight: 400; line-height: 1.3; margin-bottom: 8px; }
  .subtitle { color: var(--muted); font-size: 14px; }
  .progress-wrap { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
  .progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }
  .progress-text { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 56px; text-align: right; }
  .score-tracker { display: flex; gap: 8px; margin-top: 12px; font-size: 12px; color: var(--muted); }
  .score-pill { padding: 4px 10px; border-radius: 999px; background: var(--card); border: 1px solid var(--border); font-weight: 600; }
  .score-pill.correct-pill { color: var(--correct-strong); border-color: var(--correct); }
  .score-pill.wrong-pill { color: var(--wrong-strong); border-color: var(--wrong); }
  .feedback-banner { margin-bottom: 16px; padding: 14px 18px; border-radius: 12px; font-weight: 700; font-size: 16px; text-align: center; animation: slideIn 0.3s ease-out; letter-spacing: 0.02em; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .feedback-banner.correct { background: var(--correct); color: white; }
  .feedback-banner.wrong { background: var(--wrong); color: white; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px 20px; box-shadow: var(--shadow); animation: fadeIn 0.35s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .q-num { font-family: 'Gowun Dodum', serif; color: var(--accent); font-size: 13px; letter-spacing: 0.05em; margin-bottom: 12px; }
  .question { font-size: 16px; font-weight: 500; line-height: 1.55; margin-bottom: 20px; word-break: keep-all; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; cursor: pointer; font-family: inherit; font-size: 14.5px; line-height: 1.5; text-align: left; width: 100%; color: var(--ink); transition: all 0.15s ease; word-break: keep-all; position: relative; }
  .option:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-soft); }
  .option:active:not(:disabled) { transform: scale(0.99); }
  .option:disabled { cursor: default; }
  .option-label { flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%; background: var(--card); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--muted); transition: all 0.15s ease; }
  .option-text { flex: 1; }
  .option.correct { background: var(--correct-soft); border-color: var(--correct); border-width: 2.5px; color: var(--correct-strong); font-weight: 600; }
  .option.correct .option-label { background: var(--correct); border-color: var(--correct); color: white; }
  .option.correct .option-text { padding-right: 56px; }
  .option.correct::after { content: '✓ 정답'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--correct); color: white; font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 6px; letter-spacing: 0.02em; }
  .option.wrong { background: var(--wrong-soft); border-color: var(--wrong); border-width: 2.5px; color: var(--wrong-strong); font-weight: 600; }
  .option.wrong .option-label { background: var(--wrong); border-color: var(--wrong); color: white; }
  .option.wrong .option-text { padding-right: 56px; }
  .option.wrong::after { content: '✗ 오답'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--wrong); color: white; font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 6px; letter-spacing: 0.02em; }
  .explanation { margin-top: 16px; padding: 14px 16px; background: var(--accent-soft); border-left: 3px solid var(--accent); border-radius: 8px; font-size: 13.5px; line-height: 1.6; color: var(--ink); animation: fadeIn 0.3s ease-out; }
  .explanation strong { color: var(--accent); display: block; margin-bottom: 4px; font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase; }
  .controls { margin-top: 20px; display: flex; gap: 10px; }
  .btn { flex: 1; padding: 14px 20px; border: none; border-radius: 12px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s ease; }
  .btn-primary { background: var(--ink); color: white; }
  .btn-primary:hover { background: #000; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
  .btn-secondary:hover { border-color: var(--ink); color: var(--ink); }
  .start-screen { text-align: center; padding: 40px 20px; }
  .start-screen h2 { font-family: 'Gowun Dodum', serif; font-weight: 400; font-size: 22px; margin-bottom: 12px; }
  .start-screen p { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
  .start-info { background: var(--accent-soft); border-radius: 12px; padding: 16px; margin-bottom: 20px; font-size: 13.5px; line-height: 1.6; color: var(--ink); text-align: left; }
  .start-info strong { color: var(--accent); }
  .result { text-align: center; padding: 32px 20px; }
  .result-score { font-family: 'Gowun Dodum', serif; font-size: 64px; font-weight: 400; color: var(--accent); line-height: 1; margin-bottom: 8px; }
  .result-score span { font-size: 32px; color: var(--muted); }
  .result-text { font-size: 16px; color: var(--muted); margin-bottom: 16px; }
  .result-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 28px; padding: 16px; background: var(--bg); border-radius: 12px; border: 1px solid var(--border); }
  .result-stat { text-align: center; }
  .result-stat-num { font-family: 'Gowun Dodum', serif; font-size: 32px; font-weight: 400; line-height: 1; margin-bottom: 4px; }
  .result-stat-num.correct-num { color: var(--correct-strong); }
  .result-stat-num.wrong-num { color: var(--wrong-strong); }
  .result-stat-label { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; }
  .review { text-align: left; margin-top: 24px; border-top: 1px solid var(--border); padding-top: 20px; }
  .review h2 { font-family: 'Gowun Dodum', serif; font-weight: 400; font-size: 18px; margin-bottom: 12px; }
  .review-item { padding: 12px 14px; border-radius: 10px; margin-bottom: 8px; font-size: 13.5px; line-height: 1.5; background: var(--bg); border: 1px solid var(--border); border-left: 3px solid var(--wrong); }
  .review-item .rq { font-weight: 500; margin-bottom: 4px; }
  .review-item .ra { color: var(--muted); font-size: 13px; }
  footer { text-align: center; margin-top: 32px; font-size: 12px; color: var(--muted); font-family: 'Gowun Dodum', serif; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow">평생교육방법론</div>
    <h1 id="title">전과목 모의시험</h1>
    <div class="subtitle" id="subtitle">전체 162문제 중 무작위 20문제 출제</div>
    <div class="progress-wrap" id="progressWrap" style="display:none;">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">0 / 20</div>
    </div>
    <div class="score-tracker" id="scoreTracker" style="display:none;">
      <div class="score-pill correct-pill">✓ <span id="correctCount">0</span></div>
      <div class="score-pill wrong-pill">✗ <span id="wrongCount">0</span></div>
    </div>
  </header>
  <main id="main"></main>
  <footer>made with ripo · 학습 퀴즈</footer>
</div>

<script>
const ALL_QUESTIONS = [{"q": "평생교육이라는 용어가 본격적으로 사용되기 시작한 시기는?", "options": ["제1차 세계대전 이전부터 일반화되어 사용", "제1차 세계대전 이후 사용 시작, 1950~60년대 활발", "1980년대 한국에서 처음 도입된 용어", "2000년대 유네스코가 새롭게 만든 용어"], "answer": 1, "explanation": "평생교육 용어는 제1차 세계대전 이후 사용되기 시작하여 1950~60년대에 활발히 사용되었습니다."}, {"q": "평생교육에 대한 제도적·본격적 논의가 시작된 기관과 시기는?", "options": ["1960년대 OECD의 학습사회론", "1960년대 UNESCO의 본격적 논의", "1970년대 UN의 국제교육의 해", "1980년대 세계은행의 인적자본 보고서"], "answer": 1, "explanation": "평생교육에 대한 제도적·본격적 논의는 1960년대 UNESCO에서 시작되었으며, '본격적 논의 = UNESCO'는 자주 출제됩니다."}, {"q": "UN이 '국제교육의 해'로 지정한 해는?", "options": ["1965년", "1970년", "1972년", "1975년"], "answer": 1, "explanation": "UN은 1970년을 '국제교육의 해'로 지정하였습니다."}, {"q": "랭그랑(P. Lengrand)이 제시한 평생교육의 두 축은?", "options": ["Life-long(수직) + Life-wide(수평)", "Life-long(수평) + Life-deep(수직)", "Education + Training", "Formal + Informal"], "answer": 0, "explanation": "랭그랑은 평생교육을 Life-long(수직적) + Life-wide(수평적)으로 정의하였습니다."}, {"q": "2023년 개정 평생교육법상 평생교육의 정의로 옳은 것은?", "options": ["학교교육과 학교 밖 교육을 모두 포함하는 활동", "학교의 정규교육과정을 제외한 모든 형태의 조직적인 교육활동", "성인을 대상으로 하는 모든 학습활동", "공공기관이 운영하는 교육 프로그램"], "answer": 1, "explanation": "평생교육법상 평생교육은 '학교의 정규교육과정을 제외한 모든 형태의 조직적인 교육활동'으로 정의됩니다."}, {"q": "교육의 조직화·의도성 강도를 강한 순서대로 바르게 나열한 것은?", "options": ["형식 → 비형식 → 무형식 → 우연적", "비형식 → 형식 → 우연적 → 무형식", "무형식 → 비형식 → 형식 → 우연적", "우연적 → 무형식 → 비형식 → 형식"], "answer": 0, "explanation": "조직화·의도성 강도는 형식(학교교육) → 비형식(사회교육) → 무형식 → 우연적 순으로 강→약입니다."}, {"q": "쿰스(Coombs)가 정의한 '사회교육'의 의미로 옳은 것은?", "options": ["국가가 운영하는 의무교육 체계", "학교 교육체계 밖의 조직적·의도적 교육활동", "우연적이고 비의도적인 일상 학습", "대학 이상의 고등교육 활동"], "answer": 1, "explanation": "쿰스(Coombs)는 사회교육을 '학교 교육체계 밖의 조직적·의도적 교육활동'으로 정의했습니다."}, {"q": "1779년 교육학 강좌를 창설하여 페다고지(pedagogy)를 정립한 인물은?", "options": ["트랩(Trapp)", "노울즈(Knowles)", "크로스(Cross)", "랭그랑(Lengrand)"], "answer": 0, "explanation": "1779년 트랩(Trapp)이 교육학 강좌를 창설하면서 페다고지(pedagogy)가 정립되었습니다."}, {"q": "'성인교육의 아버지'로 불리며 1970년 앤드라고지 모형을 제시한 인물은?", "options": ["듀이(Dewey)", "트랩(Trapp)", "노울즈(Knowles)", "프레이리(Freire)"], "answer": 2, "explanation": "노울즈(Knowles)는 '성인교육의 아버지'로 불리며, 1970년 앤드라고지 모형을 제시하였습니다."}, {"q": "페다고지와 앤드라고지의 비교로 옳지 않은 것은?", "options": ["페다고지 학습자는 의존적, 앤드라고지 학습자는 자기주도적", "페다고지는 교과목 지향(미래 대비), 앤드라고지는 성과 지향(현재 활용)", "페다고지는 경험을 전 과정에서 자원으로 활용, 앤드라고지는 경험을 제한적으로 사용", "페다고지는 교육과정에 따라 표준화, 앤드라고지는 학습준비도에 따라 편성"], "answer": 2, "explanation": "경험의 역할은 반대입니다. 페다고지는 경험을 제한적으로 사용하고, 앤드라고지는 전 과정에서 유용한 자원으로 활용합니다."}, {"q": "페다고지·앤드라고지의 '직교적 입장'에 대한 설명으로 옳은 것은?", "options": ["연령에 따라 두 방법 중 하나를 선택해야 한다는 입장", "두 성향이 이차원(4사분면)에 걸쳐 나타난다는 딜라이에·리머릭·헌의 입장", "페다고지가 앤드라고지보다 우위에 있다는 입장", "두 개념이 완전히 동일하다는 입장"], "answer": 1, "explanation": "직교적 입장은 딜라이에·리머릭·헌(Delahaye, Limerick, Hearn)이 주장하며, 두 성향이 이차원(4사분면)에 걸쳐 나타난다고 봅니다."}, {"q": "학교교육과 평생교육의 비교로 옳지 않은 것은?", "options": ["학교교육 = 가르치는 것, 평생교육 = 배우는 것", "학교교육 = 자원집약형, 평생교육 = 자원절감형", "학교교육 = 단기·단속적, 평생교육 = 장기·연속", "학교교육 = 미래준비·졸업장 보상, 평생교육 = 현재 욕구 충족·실질적 보상"], "answer": 2, "explanation": "기간 비교가 반대입니다. 학교교육은 장기·연속적이고, 평생교육은 단기·단속적입니다."}, {"q": "뢰너트(Kroejnert, 2010)가 제시한 평생교육의 9원리에 해당하지 않는 것은?", "options": ["근접성·적합성·동기부여", "우선성·의사소통·피드백", "참여학습·다중감각·반복학습", "경쟁성·서열화·표준화"], "answer": 3, "explanation": "뢰너트의 9원리는 근접성·적합성·동기부여·우선성·의사소통·피드백·참여학습·다중감각·반복학습입니다. 경쟁성·서열화는 포함되지 않습니다."}, {"q": "성인발달 3구분 중 '성인 중기'에 해당하는 연령대는?", "options": ["20~40세", "40~65세", "65세 이후", "18~30세"], "answer": 1, "explanation": "성인 전기 20~40세, 성인 중기 40~65세, 성인 후기 65세 이후로 구분합니다."}, {"q": "'후형식적 사고'에 대한 설명으로 옳은 것은?", "options": ["피아제가 직접 제시한 5번째 인지발달 단계", "피아제 4단계에 후대 성인발달심리학자들이 추가한 5번째 단계", "형식적 조작기보다 낮은 단계의 사고", "유아기에 발달하는 사고 유형"], "answer": 1, "explanation": "후형식적 사고는 피아제 본인이 아니라 최근 성인발달심리학자들이 추가한 5번째 단계로, 형식적 조작기보다 한 차원 높습니다."}, {"q": "유동성 지능과 결정성 지능의 비교로 옳은 것은?", "options": ["유동성 = 경험·교육으로 얻은 지식, 결정성 = IQ와 무관한 추리력", "유동성 = IQ·후천적 학습과 무관, 결정성 = 경험·교육·훈련으로 얻은 지식·지혜", "둘 다 나이가 들면 함께 쇠퇴", "둘 다 성인 중기까지 계속 발달"], "answer": 1, "explanation": "유동성 지능은 IQ로 후천적 학습과 무관하며 나이 들면 쇠퇴합니다. 결정성 지능은 경험·교육·훈련으로 얻은 지식·지혜이며 성인 중기까지 계속 발달합니다."}, {"q": "성인 중기의 기억 특성에 대한 설명으로 옳은 것은?", "options": ["성인 중기에는 모든 기억 영역이 동일한 속도로 균등하게 감퇴한다", "감각기억과 장기기억(최근 사건)은 감퇴하나, 단기기억 개수는 젊은이와 큰 차이 없음", "감각기억만 발달하고 장기기억은 완전히 사라지는 단계이다", "단기기억이 가장 먼저 완전히 사라져 일상생활이 불가능해진다"], "answer": 1, "explanation": "성인 중기에는 감각기억과 장기기억(최근 사건)이 감퇴하지만, 단기기억은 시간이 더 걸리더라도 개수는 젊은이와 큰 차이가 없습니다."}, {"q": "'암묵적 지식(tacit knowledge)'에 대한 설명으로 옳은 것은?", "options": ["학교에서 공식적으로 가르치는 표준화된 교과 지식과 정보", "공식적으로 가르치지 않고 경험으로 습득되는 실용적 지능과 관련된 지식", "유아기에 자연스럽게 형성되어 본능적으로 작동하는 인지 지식", "나이가 들수록 빠르게 잊혀져 보존이 어려운 기억성 지식"], "answer": 1, "explanation": "암묵적 지식은 공식적으로 안 가르치고 공개적으로 표현 안 하는 지식으로, 경험으로 습득되며 실용적 지능과 관련되어 젊은 세대보다 뛰어납니다."}, {"q": "노화와 기억 연구에서 '노인도 평생교육 받을 기본적 기억능력 있음'을 주장한 인물은?", "options": ["크레이크(Craik)", "푼(Poon)", "스턴버그(Sternberg)", "Perlmutter"], "answer": 1, "explanation": "푼(Poon)은 '노인도 평생교육 받을 기본적 기억능력이 있다'고 주장했고, 크레이크(Craik)는 '노인의 단기기억력 그대로 유지'를 주장했습니다."}, {"q": "노화에 따른 감각기능 감퇴의 시작 시기로 옳지 않은 것은?", "options": ["청력 감퇴 - 25세 이후", "시력 감퇴 - 40세 전후", "미각·후각 - 50세 넘어서야 저하", "통각·온도 - 20세 전후"], "answer": 3, "explanation": "통각·온도 감각은 50세 넘어서야 저하됩니다. 25세 청력, 40세 시력, 50세 이후 미각·후각·통각·온도 순입니다."}, {"q": "성인 후기의 신체적·심리적 특성으로 옳지 않은 것은?", "options": ["자극 흔적이 오래 지속되어 반응이 느려진다", "부적절한 자극에 관심이 가서 주의가 산만해진다", "양성성이 감소하여 성역할이 명확해진다", "백내장·황화현상이 나타난다"], "answer": 2, "explanation": "성인 후기에는 양성성이 오히려 증가합니다(남성은 여성성↑, 여성은 남성성↑). 호르몬 변화 때문입니다."}, {"q": "성인 학습자의 심리적 학습장애요인 중 새 지식 거부감의 '도피 메커니즘'에서 가장 두드러지는 것은?", "options": ["혼란 거부", "구획 나눠 마찰 회피", "권위 있는 지식만 선택", "결석·불참"], "answer": 3, "explanation": "도피 메커니즘 4가지(혼란 거부, 구획 나눠 마찰 회피, 권위 있는 지식만 선택, 현실도피형) 중 가장 두드러지는 것은 결석·불참입니다."}, {"q": "학습 불안감과 학업 성취도의 관계에 대한 설명으로 옳은 것은?", "options": ["불안감이 낮을수록 성취도가 비례하여 높아진다", "불안감이 너무 낮거나 너무 높으면 성취가 저하되는 역U자 관계", "불안감이 높을수록 성취도가 비례하여 높아진다", "불안감은 성취도와 무관하다"], "answer": 1, "explanation": "학습 불안감과 성취도는 역U자 관계입니다. 너무 낮아도, 너무 높아도 성취가 저하되고, 적절한 긴장감이 도움이 됩니다."}, {"q": "성인학습자의 인성적 장애요인 3가지에 해당하지 않는 것은?", "options": ["폐쇄성 - 호기심 적음, 다른 방식 거부", "경직성 - 유연성 감소", "방어성 - 남 시선 의식, 실패에 대한 과도한 두려움", "개방성 - 새 경험에 적극 도전"], "answer": 3, "explanation": "인성적 장애요인 3가지는 폐쇄성·경직성·방어성입니다. 개방성은 장애요인이 아닌 긍정적 특성입니다."}, {"q": "실용적 지능과 일반 지능의 비교로 옳은 것은?", "options": ["실용적 지능은 학교사태에서, 일반 지능은 현실사태에서 발달", "실용적 지능은 성인기에도 계속 발달(성인 중기 정점), 일반 지능은 성인기 이후 하향", "실용적 지능은 단일해답을 추구, 일반 지능은 복수해답을 추구", "둘 다 성인 초기에 완결되어 더 이상 발달하지 않음"], "answer": 1, "explanation": "실용적 지능은 현실사태에서 성인기에도 계속 발달하여 성인 중기에 정점이고, 일반 지능은 학교사태에서 성인기 이후 하향하여 성인 초기에 완결됩니다."}, {"q": "부호화 기억법의 3요소(3R)에 해당하지 않는 것은?", "options": ["재부호화(recoding)", "관계맺기(relating)", "인출(retrieving)", "반복(repeating)"], "answer": 3, "explanation": "부호화 기억법의 3R은 재부호화(recoding)·관계맺기(relating)·인출(retrieving)입니다. 반복(repeating)은 해당하지 않습니다."}, {"q": "교수법 3종과 영어 표현의 매칭으로 옳은 것은?", "options": ["전달식 - socratic", "대화식 - didactic", "대화식 - socratic", "학습보조적 - didactic"], "answer": 2, "explanation": "교수법 3종: 전달식=didactic, 대화식=socratic(소크라테스식), 학습보조적=facilitative입니다."}, {"q": "보우(Boud et al., 1975)의 '학습보조적' 교수법 4요건에 해당하지 않는 것은?", "options": ["학습 속도의 자유", "학습 방법의 자유", "학습 내용의 자유", "학습 기간의 강제 통일"], "answer": 3, "explanation": "보우의 학습보조적 4요건은 학습의 속도·방법·내용·평가의 자유입니다. 기간 강제 통일은 해당하지 않습니다."}, {"q": "'교육은 생활이다(Education is life)'를 주장하며 진보주의 교육사상의 토대를 마련한 인물은?", "options": ["존 듀이(John Dewey)", "파울로 프레이리(Paulo Freire)", "말콤 놀스(Malcolm Knowles)", "잭 메지로(Jack Mezirow)"], "answer": 0, "explanation": "존 듀이는 '교육은 생활이다(Education is life)'를 주장한 미국 교육철학자로, 경험을 중시하고 실용주의를 강조했습니다."}, {"q": "듀이의 교육사상에 대한 설명으로 옳은 것은?", "options": ["전통적 교육의 절대적 우위를 주장", "진보적 교육과 전통적 교육의 이원론적 대립을 피하고 조화를 찾음", "교사 주도의 권위적 교육만이 유일한 방법", "경험보다는 추상적 이론을 강조"], "answer": 1, "explanation": "듀이는 진보적 교육(아동 경험 중심)과 전통적 교육(교사 주도) 사이의 이원론적 대립을 피하고 조화를 찾는 것을 교육으로 보았습니다."}, {"q": "듀이의 저서 『민주주의와 교육』의 핵심 주장으로 옳은 것은?", "options": ["교육은 단순한 지식 전달이다", "교육을 성장이라 정의하고 경험을 통해 성장 가능", "교육은 학교에서만 가능하다", "교육은 권위에 대한 복종이다"], "answer": 1, "explanation": "듀이는 『민주주의와 교육』에서 교육을 '성장'이라 정의하고, 경험을 통해 성장이 가능하다고 보았습니다. 핵심은 교육을 통한 민주사회 건설입니다."}, {"q": "듀이의 진보주의 교육관과 가장 밀접하게 연결되는 성인교육 이론은?", "options": ["프레이리의 의식화 교육", "놀스의 앤드라고지(이데올로기적 기초 제공)", "메지로의 전환학습", "리버만의 전문직론"], "answer": 1, "explanation": "듀이의 진보주의 교육관은 놀스의 앤드라고지에 이데올로기적 기초를 제공했으며, 듀이의 인본주의적 사고는 놀스의 앤드라고지와 일맥상통합니다."}, {"q": "프레이리(Freire)의 교육이념인 '프락시스(praxis)'의 의미는?", "options": ["이론적 사색", "앎과 실천의 통합 - 사회운동에 적극 참여", "교사의 일방적 강의", "학생의 수동적 수용"], "answer": 1, "explanation": "프레이리의 '앎 = 프락시스(praxis: 실천)'는 앎과 실천의 통합을 의미하며, 사회운동에 적극적으로 참여하는 것을 강조합니다."}, {"q": "프레이리의 '은행예금식 교육'과 '대화식 교육'의 차이로 옳은 것은?", "options": ["은행예금식은 학습자 주도 양방향 대화, 대화식은 교사 일방적 주입", "은행예금식 = 교사가 넣어주는 지식을 학생이 수동적 수용 / 대화식 = 교사-학생 간 양방향 대화", "두 방식 모두 학습자 주도로 진행되는 유사한 교육 방법이다", "은행예금식이 대화식보다 진보된 형태의 현대 교육 방법이다"], "answer": 1, "explanation": "은행예금식 교육은 교사가 넣어주는 지식을 학생이 일방적·수동적으로 수용하는 교화과정이고, 대화식 교육은 교사-학생 간 양방향 대화(dialogue)를 통한 학습입니다."}, {"q": "프레이리의 '문제제기식 교육'에 대한 설명으로 옳은 것은?", "options": ["은행예금식 교육을 변증법적으로 극복하는 참된 인식행위, 학습자는 창조적 주체", "교사가 학생에게 매일 다양한 문제를 일방적으로 출제하여 풀게 하는 방식", "평가와 시험 위주로 학생의 학업 성취도를 측정하는 교육 방식", "정해진 문제 풀이만을 반복적으로 시키는 기계적 학습 방식"], "answer": 0, "explanation": "문제제기식 교육은 은행예금식 교육을 변증법적으로 극복하는 참된 인식행위로, 학습자는 객체가 아니라 자신만의 의미체계를 재구성하는 창조적 주체가 됩니다."}, {"q": "프레이리 교육에서 교사의 역할로 가장 적절한 것은?", "options": ["교육내용과 결과를 강하게 통제하는 권위자", "보조자이자 또 다른 학습자, 공동의 탐구자", "평가를 전담하는 시험관", "지식을 일방적으로 전달하는 전달자"], "answer": 1, "explanation": "프레이리는 교사를 보조자이자 또 다른 학습자, 공동의 탐구자로 보며, 교육내용·결과를 통제하면 안 된다고 주장합니다."}, {"q": "놀스(Knowles)의 앤드라고지(Andragogy) 정의로 옳은 것은?", "options": ["아동을 가르치는 기술", "'성인학습을 도와주는 기술(art)로서의 과학'", "교사 중심의 강의 방법", "평가 중심의 교육 방법"], "answer": 1, "explanation": "놀스는 Andragogy를 '성인학습을 도와주는 기술(art)로서의 과학'으로 정의했습니다."}, {"q": "놀스가 제시한 성인학습의 특징 4가지에 해당하지 않는 것은?", "options": ["자아개념에 변화", "경험의 양이 다름", "학습준비도 뛰어남", "의존적 수용성"], "answer": 3, "explanation": "놀스의 성인학습 특징 4가지는 자아개념에 변화·경험의 양이 다름·학습준비도 뛰어남·학습지향 방향이 다름입니다. 의존적 수용성은 해당하지 않습니다."}, {"q": "놀스에 따른 아동학습자와 성인학습자의 지향 차이로 옳은 것은?", "options": ["아동학습자가 문제중심이고 성인학습자가 과목중심이라는 반대 입장", "아동 = 과목중심(subject centered) / 성인 = 문제중심지향(problem centered)", "아동과 성인 모두 동일하게 과목중심 학습 지향을 보인다고 봄", "아동과 성인 모두 동일하게 문제중심 학습 지향을 보인다고 봄"], "answer": 1, "explanation": "놀스에 따르면 아동학습자는 과목중심(subject centered)이고, 성인학습자는 문제중심지향(problem centered)입니다."}, {"q": "메지로(Mezirow)가 전환학습(transformative learning)을 처음 체계화·이론화한 해는?", "options": ["1968년", "1970년", "1978년", "1985년"], "answer": 2, "explanation": "메지로는 1978년에 전환학습을 처음 체계화·이론화하였습니다."}, {"q": "메지로의 전환학습에 대한 설명으로 옳은 것은?", "options": ["학습자가 자신과 세계를 보는 방식을 근본적으로 변화시키는 과정으로서의 학습", "외부에서 제공되는 단순한 지식과 정보를 습득하는 수동적 과정", "교사가 일방적으로 지식을 전달하고 학생이 수용하는 전통적 과정", "표준화된 평가를 통해 학습 결과를 검증하는 측정 중심의 과정"], "answer": 0, "explanation": "전환학습은 학습자가 자신과 세계를 보는 방식을 근본적으로 변화시키는 과정으로서의 학습이며, 위기 → 성찰 → 비판적 사고 → 새로운 관점의 흐름을 거칩니다."}, {"q": "메지로 이론에서 '의미구조(Meaning Structure)'와 학습의 관계는?", "options": ["의미구조는 학습과는 무관한 단순한 인지적 도식에 불과하다는 입장", "기존 관점이 새 상황의 변칙을 처리 못 할 때 의미구조가 바뀌는 시점이 학습이 일어나는 순간", "의미구조는 평생 변하지 않는 고정된 인격적 요소라고 본다", "의미구조는 외부 교사가 학습자에게 주입하는 인지 도식이다"], "answer": 1, "explanation": "기존 관점이 새 상황의 변칙을 처리 못 할 때 의미구조(Meaning Structure)가 바뀌는 시점이 학습이 일어나는 순간입니다."}, {"q": "메지로의 반성적 성찰 3유형 중 '과거의 가정·신념·가치관을 비판적으로 검토하여 새 관점을 찾는 것'은?", "options": ["내용반성(content reflection)", "과정반성(process reflection)", "전제반성(premise reflection)", "결과반성(outcome reflection)"], "answer": 2, "explanation": "전제반성(premise reflection)은 과거의 가정·신념·가치관을 비판적으로 검토하여 새 관점을 찾는 반성입니다."}, {"q": "메지로의 반성적 성찰 3유형 중 '경험에 대처하는 문제해결전략에 대해 생각하는 것'은?", "options": ["내용반성(content reflection)", "과정반성(process reflection)", "전제반성(premise reflection)", "결과반성(outcome reflection)"], "answer": 1, "explanation": "과정반성(process reflection)은 경험에 대처하는 문제해결전략에 대해 생각하는 반성입니다."}, {"q": "교수-학습 전개과정의 3단계 흐름으로 옳은 것은?", "options": ["도입 → 전개 → 정리", "평가 → 도입 → 전개", "전개 → 도입 → 정리", "정리 → 도입 → 전개"], "answer": 0, "explanation": "교수-학습 전개과정은 도입 → 전개 → 정리 순서입니다."}, {"q": "교수-학습 도입단계의 5요소에 해당하지 않는 것은?", "options": ["친밀감 조성", "동기유발", "교육목표 주지", "최종평가 실시"], "answer": 3, "explanation": "도입단계 5요소는 친밀감 조성·동기유발·교육목표 주지·선수학습 재생·자극 제시입니다. 최종평가는 정리단계에 해당합니다."}, {"q": "평생교육방법을 '학습자 조직'에 따라 분류할 때 해당하지 않는 것은?", "options": ["개인중심", "집단중심", "지역중심", "온라인중심"], "answer": 3, "explanation": "학습자 조직별 분류는 개인중심·집단중심·지역중심입니다. 온라인중심은 교수매체별 분류에 해당합니다."}, {"q": "평생교육에서 가장 많이 사용되는 학습자 조직 형태는?", "options": ["개인중심", "집단중심", "지역사회중심", "온라인중심"], "answer": 1, "explanation": "집단중심은 일정 공간에 모여 상호작용하는 형태로, 평생교육에서 가장 많이 사용됩니다(강의·강연·토의·역할극)."}, {"q": "자기주도학습의 5가지 가정에 해당하지 않는 것은?", "options": ["학습자 = 독립적 존재", "경험 = 학습자원", "학습준비도 개인별 다름", "교사 절대 권위 인정"], "answer": 3, "explanation": "자기주도학습 5가정은 독립적 존재·경험 학습자원·개인별 학습준비도·문제지향적·내재적 동기입니다. 교사 절대 권위는 해당하지 않습니다."}, {"q": "자기주도학습 모형 3유형의 학자 매칭으로 옳은 것은?", "options": ["선형모형 - 그로우 / 상호작용 모형 - 놀스 / 교수 모형 - 개리슨", "선형모형 - 놀스·터프 / 상호작용 모형 - 개리슨 / 교수 모형 - 그로우", "선형모형 - 개리슨 / 상호작용 모형 - 그로우 / 교수 모형 - 놀스", "선형모형 - 메지로 / 상호작용 모형 - 듀이 / 교수 모형 - 프레이리"], "answer": 1, "explanation": "자기주도학습 3모형은 선형(놀스·터프), 상호작용(개리슨), 교수(그로우) 모형입니다."}, {"q": "계약학습(contract learning)에 대한 설명으로 옳은 것은?", "options": ["학습내용·방법·평가기준 명시한 공식 합의서 작성 후 학습자 주도 진행, 놀스가 최초 소개", "교사가 일방적으로 계약 조건을 정하고 학생에게 이행을 요구하는 방식", "학부모와 학교 간에 행정적 책임 분담을 위해 체결하는 계약", "수료증 발급을 전제로 학습자에게 의무를 부과하는 강제 학습 방식"], "answer": 0, "explanation": "계약학습은 학습내용·방법·평가기준을 명시한 공식 합의서 작성 후 학습자 주도로 진행되는 방식으로, 놀스가 최초로 소개했습니다."}, {"q": "집단중심 교육방법의 핵심 특징은?", "options": ["교수자가 일방적으로 강의하고 학습자가 수용하는 전통적 방식", "상호학습의 원리 - 같은 목적의 학습자끼리 서로 가르치며 배움", "성적 평가 중심의 경쟁적 학습 환경을 조성하는 방식", "각 학습자가 개별화된 자율적 학습 경로를 따라가는 방식"], "answer": 1, "explanation": "집단중심 교육방법의 핵심 특징은 상호학습의 원리로, 같은 목적의 학습자끼리 서로 가르치며 배웁니다."}, {"q": "Cranton & Weston(1989)의 집단중심 교수기법 분류에 해당하지 않는 것은?", "options": ["교수자중심기법", "상호작용기법", "개별화학습기법", "온라인기법"], "answer": 3, "explanation": "Cranton & Weston(1989)의 분류는 교수자중심기법·상호작용기법·개별화학습기법·경험학습입니다. 온라인기법은 별도 분류로 포함되지 않습니다."}, {"q": "버즈그룹(buzz group)의 적정 인원과 명칭 유래로 옳은 것은?", "options": ["10~15명 / 화이트보드 사용", "4~7명 / 'buzz' = 윙윙거리는 소리", "20~30명 / 'buzz' = 벌집 모양", "2~3명 / 'buzz' = 종소리"], "answer": 1, "explanation": "버즈그룹은 4~7명 소집단이 왁자지껄 토의하는 방식으로, 'buzz'는 윙윙거리는 소리를 의미합니다."}, {"q": "브레인스토밍(brainstorming)의 기원으로 옳은 것은?", "options": ["1920년 영국 대학 토론회", "1941년 미국 광고회사 설립자가 광고 아이디어 위해 고안", "1955년 일본 기업의 품질관리 회의", "1960년 독일 정부의 정책 도출 회의"], "answer": 1, "explanation": "브레인스토밍은 1941년 미국 광고회사 설립자가 광고 아이디어 도출을 위해 고안한 방법으로, 5~7명이 자유분방한 의견 교환으로 창의적 아이디어를 도출합니다."}, {"q": "패널(panel) 토의의 인원 구성과 청중 참여에 대한 설명으로 옳은 것은?", "options": ["10명 이상 / 청중 자유 참여", "3~6명 배심토의 / 원칙적으로 청중 의견개진 불가", "2명 1조 / 청중 투표로 결정", "20명 / 사회자 없이 진행"], "answer": 1, "explanation": "패널은 의견을 달리하는 3~6명이 청중 앞에서 토의하는 배심토의로, 원칙적으로 청중 의견개진은 불가능합니다(사회자 재량 시 가능)."}, {"q": "감수성 훈련(sensitivity training)의 인원과 특성으로 옳은 것은?", "options": ["3~5명 소수 인원이 1일 단기 워크숍 형태로 진행하는 토론", "10~20명 자발적 참여자 / 며칠간 함께 지내며 개방적 상호작용", "50명 이상 대규모로 강의 중심 진행하는 집합 연수 방식", "2명 1조로 멘토링 형식의 일대일 상담 훈련을 진행하는 방식"], "answer": 1, "explanation": "감수성 훈련은 10~20명 자발적 참여자가 며칠간 함께 지내며 개방적 상호작용을 통해 대인관계 기술·감수성을 증진하는 방법입니다."}, {"q": "액션러닝(action learning)의 개발자와 개발 배경으로 옳은 것은?", "options": ["영국 국립석탄위원회 교육책임자 레반스(Revans)가 탄광 문제 해결 위해 개발", "미국 GE의 사내 인적자원개발 교육 프로그램으로 출발한 방법", "독일 자동차 회사의 품질관리 운동에서 비롯된 학습 방법", "일본 도요타의 카이젠 운동에서 발전된 현장 학습 방법"], "answer": 0, "explanation": "액션러닝은 영국 국립석탄위원회 교육책임자 레반스(Revans)가 탄광 문제 해결을 위해 개발했으며, '해결책은 현장에 있다'는 철학을 기반으로 합니다."}, {"q": "액션러닝의 6가지 구성요소 중 '가장 중요한 특징'으로 꼽히는 것은?", "options": ["과제", "팀(5~7명)", "질문·성찰·피드백", "실행의지"], "answer": 2, "explanation": "액션러닝 6요소(과제·팀·실행의지·러닝코치·질문/성찰/피드백·학습) 중 가장 중요한 특징은 질문·성찰·피드백입니다."}, {"q": "프레이리(Freire, 1993)가 정의한 '지역평생교육'의 핵심은?", "options": ["국가가 주도하는 표준화된 교육 사업", "민중의 삶에 기초하여 그들의 문제점을 해결하고 해방시켜야 함", "대학교수가 주도하는 학술적 활동", "민간기업이 운영하는 직업훈련"], "answer": 1, "explanation": "프레이리(1993)는 '지역평생교육은 민중의 삶에 기초하여 그들의 문제점을 해결하고 해방시켜야 한다'고 정의했습니다."}, {"q": "브라질 프레이리식 민중교육의 핵심 개념 '침묵의 문화'가 발생하는 과정은?", "options": ["피지배자가 자발적으로 침묵을 선택하여 자기 보호를 도모하는 과정", "지배자 논리 강요 → 피지배자 왜곡된 현실인식 → 침묵의 문화 → 자기비하적 정체성", "교육 기회 부족으로 인해 일시적으로 발생하는 사회적 침묵 현상", "평화롭고 안정된 사회에서 자연스럽게 형성되는 조용한 공동체 문화"], "answer": 1, "explanation": "지배자 논리가 강요되어 피지배자가 왜곡된 현실인식을 갖게 되고, 이로 인해 침묵의 문화가 형성되어 자기비하적 정체성이 만들어집니다."}, {"q": "프레이리식 민중교육의 단계로 옳은 것은?", "options": ["입학 → 정기 강의 → 시험 → 평가 → 수료의 일반적 단계", "발생적 주제(generative themes) 찾기 → 자료 수집 → 주제탐구활동 → 문화활동으로 실제 교육", "기초 시험 → 학습자 합격 판정 → 자격증 발급 → 사후 관리", "온라인 등록 → 비대면 강좌 수강 → 평가 후 종료의 절차"], "answer": 1, "explanation": "프레이리식 민중교육 단계는 발생적 주제 찾기 → 자료 수집 → 주제탐구활동(thematic investigation circle) → 문화활동(culture circle)으로 실제 교육 → 대화 중심 논의입니다."}, {"q": "스웨덴 학습동아리의 창시자와 창시 연도, 실천기구 명칭으로 옳은 것은?", "options": ["1902년 오스카 올슨(Oscar Olsson) 창시, 스터디 서클(Study Circle)", "1920년 그룬트비히가 국민대학을 창설하며 동시에 시작된 형태", "1947년 프레이리가 브라질에서 민중문화운동을 통해 설립한 형태", "1955년 레반스가 영국에서 액션러닝과 함께 도입한 학습 형태"], "answer": 0, "explanation": "스웨덴 학습동아리는 1902년 오스카 올슨이 창시했으며, 실천기구는 스터디 서클(Study Circle)입니다."}, {"q": "스웨덴 학습동아리가 정부 재정보조 입법화된 해는?", "options": ["1902년", "1920년", "1947년", "1960년"], "answer": 2, "explanation": "스웨덴 학습동아리는 1947년 정부 재정보조 입법화가 이루어졌습니다."}, {"q": "덴마크 국민대학에서 중시한 교과로 옳은 것은?", "options": ["과학과 수학", "덴마크 역사와 문학", "외국어와 국제정세", "경제학과 경영학"], "answer": 1, "explanation": "덴마크 국민대학은 1880~1914년 전국 51개가 창설되었으며, 중시한 교과는 덴마크 역사와 문학이었습니다."}, {"q": "우리나라 마을 만들기가 본격적으로 시작된 계기는?", "options": ["1970년대 새마을운동", "1997년 IMF 이후 위험사회 극복 대안으로 시작", "2000년대 평생학습도시 사업", "2010년대 도시재생 뉴딜"], "answer": 1, "explanation": "우리나라 마을 만들기는 1997년 IMF 이후 위험사회 극복 대안으로 시작되었으며, 대표 사례로 진안군(2000)·광주 북구(2006)·안산시(2008)·서울(2013) 등이 있습니다."}, {"q": "매체(media)의 어원적 의미로 옳은 것은?", "options": ["그리스어 'mathema' - 가르치다", "라틴어 'medius' - 송신자-수신자 연결 매개체", "독일어 'mittel' - 도구", "영어 'medium' - 중간"], "answer": 1, "explanation": "매체(media)는 라틴어 'medius'에서 유래했으며, 송신자-수신자를 연결하는 매개체를 의미합니다."}, {"q": "시청각교육 원리를 17세기에 처음 제시한 인물은?", "options": ["데일(Dale)", "코메니우스(Comenius)", "듀이(Dewey)", "피아제(Piaget)"], "answer": 1, "explanation": "코메니우스(Comenius)는 17세기에 시청각교육 원리를 제시했으며, 쉬운 것→어려운 것 단계적 진행, 구두 제시 전 시각자료 먼저, 실물 먼저 언어 설명 나중을 강조했습니다."}, {"q": "데일(Dale)의 '경험의 원추(Cone of Experience)'에 대한 설명으로 옳은 것은?", "options": ["엄격한 단계적 구분 모델", "구체성-추상성의 연속성을 표현한 메타포", "교사 평가용 도구", "학습자 분류 도식"], "answer": 1, "explanation": "데일의 경험의 원추는 11개 요소로 구성되며, 데일 자신이 '단계적 구분이 아닌 구체성-추상성의 연속성을 표현한 메타포'라고 설명했습니다."}, {"q": "Reiser & Gagne(1983)의 매체 선정 준거 4가지에 해당하지 않는 것은?", "options": ["학습자", "학습목표", "수업활동", "사회적 비용"], "answer": 3, "explanation": "Reiser & Gagne의 매체 선정 준거 4가지는 학습자·학습목표·수업활동·수업상황입니다. 사회적 비용은 해당하지 않습니다."}, {"q": "CAI(Computer Assisted Instruction)의 유형에 해당하지 않는 것은?", "options": ["반복연습형, 개인교수형", "시뮬레이션형, 게임형", "발견학습형(문제해결형), 자료제시형", "권위주의형, 평가전담형"], "answer": 3, "explanation": "CAI 유형은 반복연습형·개인교수형·시뮬레이션형·게임형·발견학습형·자료제시형입니다. 권위주의형·평가전담형은 해당하지 않습니다."}, {"q": "학교교육과 평생교육에서 '교육자료'의 위상 차이로 옳은 것은?", "options": ["학교교육과 평생교육 모두 자료를 주교재 그 자체로 활용한다는 입장", "학교교육 = 교과서 보충용 보조적 구안물 / 평생교육 = 평생교육사 제작 교재가 주교재이자 핵심", "학교교육과 평생교육은 동일한 표준 교과서를 사용하여 운영된다", "학교교육과 평생교육의 교육자료는 모두 부수적인 보조자료에 불과하다"], "answer": 1, "explanation": "학교교육에서 자료는 교과서 보충용 보조적 구안물이지만, 평생교육에서는 표준 교과서가 없어 평생교육사가 제작한 교재가 주교재이자 교수-학습의 핵심 자료입니다."}, {"q": "잘 개발된 교육자료의 유용성 4가지에 해당하지 않는 것은?", "options": ["교수-학습 과정의 표준화", "효과성·효율성 증대", "매력성 증대", "권위성 강화"], "answer": 3, "explanation": "잘 개발된 자료의 유용성 4가지는 표준화·효과성·효율성·매력성입니다. 권위성 강화는 해당하지 않습니다."}, {"q": "평생교육자료 개발의 기본원리 3대 구성요소는?", "options": ["내용·표현·설계", "평가·관리·운영", "계획·실행·평가", "입력·처리·출력"], "answer": 0, "explanation": "평생교육자료 개발의 기본원리 3대 구성요소는 내용·표현·설계입니다. 내용 원리는 적절성·정확성·완전성입니다."}, {"q": "ASSURE 모델의 단계 순서로 옳은 것은?", "options": ["A-S-S-U-R-E (학습자 분석→목표 설정→방법·매체·자료 선택→매체·자료 활용→학습자 참여 촉진→평가·수정)", "E-R-U-S-S-A (평가→참여→활용→선택→설정→분석)로 거꾸로 진행", "A-U-R-S-S-E (분석→활용→참여→선택→설정→평가) 순서로 진행", "S-A-U-R-E-S (설정→분석→활용→참여→평가→선택) 순서로 진행"], "answer": 0, "explanation": "ASSURE 모델은 Analyze learners → State objectives → Select methods, media and materials → Utilize media and materials → Require learner participation → Evaluation and revise 순서입니다."}, {"q": "ASSURE 모델의 마지막 단계 'E'가 의미하는 것은?", "options": ["Examination(시험)", "Evaluation and revise(평가·수정)", "Education(교육)", "Establishment(확립)"], "answer": 1, "explanation": "ASSURE의 마지막 E는 Evaluation and revise(평가·수정)로, 목표달성 여부 및 매체·교수방법·과정을 평가합니다."}, {"q": "인쇄자료 학습법 SQ3R의 단계 순서로 옳은 것은?", "options": ["Read → Recite → Review → Survey → Question", "Survey → Question → Read → Recite → Review", "Question → Survey → Read → Review → Recite", "Review → Read → Recite → Question → Survey"], "answer": 1, "explanation": "SQ3R 학습법은 Survey(개괄 파악) → Q const QUIZ_SIZE = 20;

// Fisher-Yates shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 문제 선정 + 각 문제의 보기도 셔플 (정답 위치 랜덤화)
function prepareQuiz() {
  const picked = shuffle(ALL_QUESTIONS).slice(0, QUIZ_SIZE);
  return picked.map(q => {
    const optsWithIdx = q.options.map((opt, i) => ({ opt, isAnswer: i === q.answer }));
    const shuffled = shuffle(optsWithIdx);
    const newAnswer = shuffled.findIndex(x => x.isAnswer);
    return {
      q: q.q,
      options: shuffled.map(x => x.opt),
      answer: newAnswer,
      explanation: q.explanation
    };
  });
}

let state = { quiz: [], idx: 0, answers: [], started: false };
const main = document.getElementById('main');
const labels = ['A', 'B', 'C', 'D', 'E'];

function renderStart() {

function startQuiz() {
  state.quiz = prepareQuiz();
  state.idx = 0;
  state.answers = [];
  state.started = true;
  document.getElementById('progressWrap').style.display = 'flex';
  document.getElementById('scoreTracker').style.display = 'flex';
  updateProgress();
  renderQuestion();
  window.scrollTo({top:0, behavior:'smooth'});
}

function updateProgress() {
  const total = state.quiz.length;
  const done = state.answers.filter(a => a !== undefined).length;
  document.getElementById('progressFill').style.width = `${(done/total)*100}%`;
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  const correctNum = state.answers.filter((a, i) => a !== undefined && a === state.quiz[i].answer).length;
  const wrongNum = state.answers.filter((a, i) => a !== undefined && a !== state.quiz[i].answer).length;
  document.getElementById('correctCount').textContent = correctNum;
  document.getElementById('wrongCount').textContent = wrongNum;
}

function renderQuestion() {
  const q = state.quiz[state.idx];
  const total = state.quiz.length;
  const answered = state.answers[state.idx];
  const isCorrect = answered === q.answer;

  main.innerHTML = `
    ${answered !== undefined ? `
      <div class="feedback-banner ${isCorrect ? 'correct' : 'wrong'}">
        ${isCorrect ? '🎉 맞았어요!' : '❌ 틀렸어요'}
      </div>
    ` : ''}
    <div class="card">
      <div class="q-num">문제 ${state.idx + 1} / ${total}</div>
      <div class="question">${q.q}</div>
      <div class="options">
        ${q.options.map((opt, i) => {
          let cls = 'option';
          if (answered !== undefined) {
            if (i === q.answer) cls += ' correct';
            else if (i === answered) cls += ' wrong';
          }
          return `<button class="${cls}" data-idx="${i}" ${answered !== undefined ? 'disabled' : ''}>
            <span class="option-label">${labels[i]}</span>
            <span class="option-text">${opt}</span>
          </button>`;
        }).join('')}
      </div>
      ${answered !== undefined && q.explanation ? `
        <div class="explanation"><strong>해설</strong>${q.explanation}</div>
      ` : ''}
      <div class="controls">
        ${state.idx > 0 ? '<button class="btn btn-secondary" id="prevBtn">이전</button>' : ''}
        ${answered !== undefined ? (
          state.idx < total - 1
            ? '<button class="btn btn-primary" id="nextBtn">다음 문제</button>'
            : '<button class="btn btn-primary" id="finishBtn">결과 보기</button>'
        ) : ''}
      </div>
    </div>
  `;

  main.querySelectorAll('.option:not(:disabled)').forEach(btn => {
    btn.addEventListener('click', () => {
      const choice = parseInt(btn.dataset.idx);
      state.answers[state.idx] = choice;
      updateProgress();
      renderQuestion();
    });
  });
  document.getElementById('prevBtn')?.addEventListener('click', () => { state.idx--; renderQuestion(); window.scrollTo({top:0, behavior:'smooth'}); });
  document.getElementById('nextBtn')?.addEventListener('click', () => { state.idx++; renderQuestion(); window.scrollTo({top:0, behavior:'smooth'}); });
  document.getElementById('finishBtn')?.addEventListener('click', renderResult);
}

  let msg = '훌륭해요! 시험 준비 잘 되셨네요';
  if (pct < 60) msg = '핵심 포인트 다시 한번 복습해볼까요?';
  else if (pct < 80) msg = '거의 다 왔어요! 헷갈리는 부분만 보완하세요';
  else if (pct < 95) msg = '아주 좋아요! 디테일만 한번 더 점검해보세요';

  main.innerHTML = `
    <div class="card result">
      <div class="result-score">${correct}<span>/${total}</span></div>
      <div class="result-text">정답률 ${pct}% · ${msg}</div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-num correct-num">${correct}</div>
          <div class="result-stat-label">맞은 문제</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-num wrong-num">${wrong}</div>
          <div class="result-stat-label">틀린 문제</div>
        </div>
      </div>
      <div class="controls" style="max-width: 320px; margin: 0 auto; gap: 8px;">
        <button class="btn btn-primary" id="retryBtn">새 문제 다시 풀기</button>
      </div>
      ${wrong > 0 ? `
        <div class="review">
          <h2>틀린 문제 다시 보기</h2>
          ${state.quiz.map((q, i) => {
            const ok = state.answers[i] === q.answer;
            if (ok) return '';
            return `<div class="review-item">
              <div class="rq">${i+1}. ${q.q}</div>
              <div class="ra">정답: ${labels[q.answer]}. ${q.options[q.answer]}</div>
            </div>`;
          }).join('')}
        </div>
      ` : `<div style="margin-top: 24px; color: var(--correct-strong); font-size: 14px; font-weight: 600;">🎉 전부 맞히셨어요!</div>`}
    </div>
  `;
  document.getElementById('retryBtn').addEventListener('click', () => {
    startQuiz();
  });
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = `${total} / ${total}`;
}

renderStart();
</script>
</body>
</html>
