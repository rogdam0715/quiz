<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>지역사회교육론 6강·8강 랜덤 퀴즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #FAF7F2; --ink: #1A1A1A; --muted: #6B6B6B; --card: #FFFFFF;
    --border: #E8E2D5; --accent: #2E5C4F; --accent-soft: #E8F0EC;
    --correct: #16A34A; --correct-soft: #DCFCE7; --correct-strong: #15803D;
    --wrong: #DC2626; --wrong-soft: #FEE2E2; --wrong-strong: #B91C1C;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
  }
  html, body { background: var(--bg); color: var(--ink); font-family: 'IBM Plex Sans KR', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; overscroll-behavior-y: contain; }
  body { background-image: radial-gradient(circle at 10% 0%, rgba(46,92,79,0.04) 0%, transparent 40%), radial-gradient(circle at 90% 100%, rgba(220,38,38,0.03) 0%, transparent 40%); }
  .app { max-width: 560px; margin: 0 auto; padding: 24px 20px 40px; }
  header { margin-bottom: 24px; }
  .eyebrow { font-family: 'Gowun Dodum', serif; color: var(--accent); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-family: 'Gowun Dodum', serif; font-size: 24px; font-weight: 400; line-height: 1.3; margin-bottom: 8px; }
  .subtitle { color: var(--muted); font-size: 14px; }
  .progress-wrap { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
  .progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }
  .progress-text { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 56px; text-align: right; }
  .score-tracker { display: flex; gap: 8px; margin-top: 12px; font-size: 12px; color: var(--muted); }
  .score-pill { padding: 4px 10px; border-radius: 999px; background: var(--card); border: 1px solid var(--border); font-weight: 600; }
  .score-pill.correct-pill { color: var(--correct-strong); border-color: var(--correct); }
  .score-pill.wrong-pill { color: var(--wrong-strong); border-color: var(--wrong); }
  .feedback-banner { margin-bottom: 16px; padding: 14px 18px; border-radius: 12px; font-weight: 700; font-size: 16px; text-align: center; animation: slideIn 0.3s ease-out; letter-spacing: 0.02em; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .feedback-banner.correct { background: var(--correct); color: white; }
  .feedback-banner.wrong { background: var(--wrong); color: white; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px 20px; box-shadow: var(--shadow); animation: fadeIn 0.35s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .q-num { font-family: 'Gowun Dodum', serif; color: var(--accent); font-size: 13px; letter-spacing: 0.05em; margin-bottom: 12px; }
  .question { font-size: 16px; font-weight: 500; line-height: 1.55; margin-bottom: 20px; word-break: keep-all; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; cursor: pointer; font-family: inherit; font-size: 14.5px; line-height: 1.5; text-align: left; width: 100%; color: var(--ink); transition: all 0.15s ease; word-break: keep-all; position: relative; }
  .option:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-soft); }
  .option:active:not(:disabled) { transform: scale(0.99); }
  .option:disabled { cursor: default; }
  .option-label { flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%; background: var(--card); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--muted); transition: all 0.15s ease; }
  .option-text { flex: 1; }
  .option.correct { background: var(--correct-soft); border-color: var(--correct); border-width: 2.5px; color: var(--correct-strong); font-weight: 600; }
  .option.correct .option-label { background: var(--correct); border-color: var(--correct); color: white; }
  .option.correct .option-text { padding-right: 56px; }
  .option.correct::after { content: '✓ 정답'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--correct); color: white; font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 6px; letter-spacing: 0.02em; }
  .option.wrong { background: var(--wrong-soft); border-color: var(--wrong); border-width: 2.5px; color: var(--wrong-strong); font-weight: 600; }
  .option.wrong .option-label { background: var(--wrong); border-color: var(--wrong); color: white; }
  .option.wrong .option-text { padding-right: 56px; }
  .option.wrong::after { content: '✗ 오답'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--wrong); color: white; font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 6px; letter-spacing: 0.02em; }
  .explanation { margin-top: 16px; padding: 14px 16px; background: var(--accent-soft); border-left: 3px solid var(--accent); border-radius: 8px; font-size: 13.5px; line-height: 1.6; color: var(--ink); animation: fadeIn 0.3s ease-out; }
  .explanation strong { color: var(--accent); display: block; margin-bottom: 4px; font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase; }
  .controls { margin-top: 20px; display: flex; gap: 10px; }
  .btn { flex: 1; padding: 14px 20px; border: none; border-radius: 12px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s ease; }
  .btn-primary { background: var(--ink); color: white; }
  .btn-primary:hover { background: #000; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
  .btn-secondary:hover { border-color: var(--ink); color: var(--ink); }
  .start-screen { text-align: center; padding: 40px 20px; }
  .start-screen h2 { font-family: 'Gowun Dodum', serif; font-weight: 400; font-size: 22px; margin-bottom: 12px; }
  .start-screen p { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
  .start-info { background: var(--accent-soft); border-radius: 12px; padding: 16px; margin-bottom: 20px; font-size: 13.5px; line-height: 1.6; color: var(--ink); text-align: left; }
  .start-info strong { color: var(--accent); }
  .result { text-align: center; padding: 32px 20px; }
  .result-score { font-family: 'Gowun Dodum', serif; font-size: 64px; font-weight: 400; color: var(--accent); line-height: 1; margin-bottom: 8px; }
  .result-score span { font-size: 32px; color: var(--muted); }
  .result-text { font-size: 16px; color: var(--muted); margin-bottom: 16px; }
  .result-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 28px; padding: 16px; background: var(--bg); border-radius: 12px; border: 1px solid var(--border); }
  .result-stat { text-align: center; }
  .result-stat-num { font-family: 'Gowun Dodum', serif; font-size: 32px; font-weight: 400; line-height: 1; margin-bottom: 4px; }
  .result-stat-num.correct-num { color: var(--correct-strong); }
  .result-stat-num.wrong-num { color: var(--wrong-strong); }
  .result-stat-label { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; }
  .review { text-align: left; margin-top: 24px; border-top: 1px solid var(--border); padding-top: 20px; }
  .review h2 { font-family: 'Gowun Dodum', serif; font-weight: 400; font-size: 18px; margin-bottom: 12px; }
  .review-item { padding: 12px 14px; border-radius: 10px; margin-bottom: 8px; font-size: 13.5px; line-height: 1.5; background: var(--bg); border: 1px solid var(--border); border-left: 3px solid var(--wrong); }
  .review-item .rq { font-weight: 500; margin-bottom: 4px; }
  .review-item .ra { color: var(--muted); font-size: 13px; }
  footer { text-align: center; margin-top: 32px; font-size: 12px; color: var(--muted); font-family: 'Gowun Dodum', serif; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow">지역사회교육론</div>
    <h1 id="title">6강·8강 랜덤 퀴즈</h1>
    <div class="subtitle" id="subtitle">전체 101문제 중 무작위 15문제 출제</div>
    <div class="progress-wrap" id="progressWrap" style="display:none;">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">0 / 15</div>
    </div>
    <div class="score-tracker" id="scoreTracker" style="display:none;">
      <div class="score-pill correct-pill">✓ <span id="correctCount">0</span></div>
      <div class="score-pill wrong-pill">✗ <span id="wrongCount">0</span></div>
    </div>
  </header>
  <main id="main"></main>
  <footer>made with ripo · 학습 퀴즈</footer>
</div>

<script>
const ALL_QUESTIONS = [{"q": "지역을 하나의 평생학습체제로 구축하기 위해 가장 필요한 것은?", "options": ["학교교육의 확대", "지역 자원들 간의 연계", "중앙정부의 직접 운영", "민간기업의 단독 투자"], "answer": 1, "explanation": "지역을 평생학습체제로 구축하려면 지역의 자원들 간 연계가 필요하며, 개인의 평생학습이 통합적으로 작동하려면 물적·인적 자원의 연계가 필수입니다."}, {"q": "포천시 관인면 '장독대 마을'에 대한 설명으로 옳지 않은 것은?", "options": ["한탄강 홍수 조절용 댐 건설로 형성된 집단 이주지이다", "2012년 인근 산자락에 집단 이주하여 형성되었다", "예술가 집단이 1년간 거주하며 한옥을 복원하였다", "약 50년 된 근대가옥을 집단 이주지에 복원하였다"], "answer": 2, "explanation": "예술가 집단은 3개월간(1년이 아님) 거주하며 약 50년 된 근대가옥을 복원하였습니다."}, {"q": "장독대 마을의 프로젝트명은?", "options": ["관인 한옥 복원 프로젝트", "포천 도롱이집 이주 프로젝트", "한탄강 마을 재건 사업", "장독대 문화예술 프로젝트"], "answer": 1, "explanation": "PDF 강의록 표기 기준 프로젝트명은 '포천 도롱이집 이주 프로젝트'입니다."}, {"q": "장독대 마을 사례의 핵심 의미로 가장 적절한 것은?", "options": ["관광 자원을 활용한 경제 활성화", "교육을 기제로 활용한 지역 주체·부문의 연계", "전통문화 보존 사업의 국가적 확대", "예술인 일자리 창출"], "answer": 1, "explanation": "교육을 기재(기제)로 활용하여 지역의 다양한 주체·부문을 연계함으로써 수몰 갈등 해소와 새로운 삶터에서의 자생력·경쟁력을 확보하는 것이 핵심 의미입니다."}, {"q": "지역교육 발전 맥락에서 연계의 필요성으로 옳지 않은 것은?", "options": ["지역 자원이 한정되어 있고 고르게 분포되어 있지 않다", "현대인들은 정보의 홍수 속에 살고 있다", "획일화된 제도교육이 개인의 다양한 욕구에 대응하지 못한다", "지역 자원의 독점적 활용을 통해 경쟁력을 확보해야 한다"], "answer": 3, "explanation": "연계의 필요성은 자원 한정·불균등, 정보 홍수, 비용 감소, 획일화된 제도교육의 한계, 전문지도자 육성·평생학습 기회 확대 등입니다. '독점적 활용'은 연계의 취지에 반합니다."}, {"q": "한정된 자원을 연계할 때 얻을 수 있는 효과는?", "options": ["인구 증가", "비용 감소", "세금 인상", "제도교육 강화"], "answer": 1, "explanation": "한정된 자원을 연계하면 비용 감소 효과를 얻을 수 있습니다."}, {"q": "지역교육 연계에서 평생교육사에게 요구되는 핵심 역할은?", "options": ["지역 정책 수립을 총괄하는 행정 감독자", "지역 평생학습 재정을 운영하는 관리자", "지역의 인적·물적·사업·정보의 네트워커", "주민에게 직접 강의하는 프로그램 강사"], "answer": 2, "explanation": "연계의 필요성에서 도출되는 결론으로, 평생교육사에게는 지역의 인적·물적·사업·정보의 '네트워커' 역할이 요구됩니다."}, {"q": "연계를 가로막는 장애요인 3가지에 해당하지 않는 것은?", "options": ["서로에 대한 신뢰와 이해 미흡", "시간과 재원 부족", "의사소통과 지속성의 어려움", "법적 규제의 부재"], "answer": 3, "explanation": "장애요인 3가지는 ①신뢰·이해 미흡 ②시간·재원 부족 ③의사소통·지속성의 어려움입니다. 법적 규제는 해당되지 않습니다."}, {"q": "서로에 대한 신뢰 자체를 부르는 용어는?", "options": ["문화적 자본", "사회적 자본", "인적 자본", "경제적 자본"], "answer": 1, "explanation": "서로에 대한 ·공유, 공동사업 제휴, 직원 공동연수 등입니다. 경쟁입찰 독점 수주는 연계의 취지와 반대됩니다."}, {"q": "연계 주체의 또 다른 정의로 가장 적절한 것은?", "options": ["오직 행정기관만을 의미한다", "연계 가능 자원 ↔ 연계 받고자 하는 자원", "민간단체만을 의미한다", "법인격 있는 기관만을 의미한다"], "answer": 1, "explanation": "연계 주체는 '연계 가능 자원'과 '연계 받고자 하는 자원'으로 이해할 수 있습니다."}, {"q": "사랑나누리 방과후 센터에서 학생회 학우들이 담당한 역할은?", "options": ["센터 운영 행정 관리자로 일함", "자원활동가로 방과 후 보충학습 지도", "운영비를 후원하는 재정 후원자 역할", "공간을 빌려주는 건물 임대인 역할"], "answer": 1, "explanation": "한국방송통신대학교 이천학생회 학우들은 자원활동가로 모집되어 방과 후 보충학습을 지도하였습니다."}, {"q": "사랑나누리 방과후 센터에서 이천시가 담당한 연계 역할은?", "options": ["오직 재정 지원만 담당", "시설 제공·강사 파견 등", "학생 직접 선발", "프로그램 직접 운영"], "answer": 1, "explanation": "이천시는 시설 제공과 강사 파견 등의 역할을 담당하였습니다."}, {"q": "관악구의 거점 교육기관에 해당하지 않는 것은?", "options": ["중앙사회복지관", "신림종합사회복지관", "YMCA 봉천종합사회복지관", "서울대학교 평생교육원"], "answer": 3, "explanation": "관악구 거점 교육기관은 중앙사회복지관, 신림종합사회복지관, YMCA 봉천종합사회복지관, 관악청소년회관, 한국산업블로그협회(강의록 표기) 등입니다."}, {"q": "관악구가 학습권역을 5개로 구획한 기준은?", "options": ["행정구역의 인구수", "지역특성 및 주민 학습요구", "중앙정부의 표준 가이드라인", "상권 규모"], "answer": 1, "explanation": "관악구는 지역특성 및 주민 학습요구에 따라 학습권역을 5개로 구획하였습니다."}, {"q": "지역연계를 위한 지역교육의 과제 중 '연계·협력의 비전에 대한 합의 도출'에서 강조되는 것은?", "options": ["관(官) 주도의 비전 수립과 일방적 통보", "민(民) 주도의 비전 수립, 합의 도출 워크숍", "외부 전문가의 단독 결정과 권고안 제시", "국제기구의 권고에 따른 표준 비전 수용"], "answer": 1, "explanation": "연계·협력 비전 도출은 민(民) 주도의 비전 수립과 합의 도출 워크숍을 통해 이루어져야 합니다."}, {"q": "'지역공동체 구축을 위한 지역교육' 과제의 핵심 원칙으로 옳지 않은 것은?", "options": ["생활권 중심", "학습권 보장", "주민 학습욕구·지역상황 반영", "전국 표준 일률 적용"], "answer": 3, "explanation": "지역공동체 구축을 위한 지역교육은 생활권 중심, 학습권 보장, 주민 학습욕구·지역상황 반영을 원칙으로 합니다. 전국 일률 적용은 원칙에 반합니다."}, {"q": "지역의 다양한 부문과의 연계에 해당하지 않는 것은?", "options": ["정치, 경제, 행정", "학문, 예술, 종교", "복지, 노동", "오직 학교교육 부문"], "answer": 3, "explanation": "지역의 다양한 부문은 정치, 경제, 행정, 학문, 예술, 종교, 복지, 노동 등 광범위하며, 학교교육에 한정되지 않습니다."}, {"q": "'연계의 공동경험 확보를 위한 주민참여 사업 기획 및 운영'의 마중물 효과로 가장 적절한 것은?", "options": ["행정 절차의 간소화와 빠른 의사결정 도출", "상호 이해 → 신뢰 구축 → 지역 연계 플랫폼 구축", "예산 절감과 비용 효율적 사업 운영", "사업 추진 속도 향상과 단기 성과 창출"], "answer": 1, "explanation": "이 과제는 상호 이해를 통한 const QUIZ_SIZE = 15;

// Fisher-Yates shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 문제 선정 + 각 문제의 보기도 셔플 (정답 위치 랜덤화)
function prepareQuiz() {
  const picked = shuffle(ALL_QUESTIONS).slice(0, QUIZ_SIZE);
  return picked.map(q => {
    const optsWithIdx = q.options.map((opt, i) => ({ opt, isAnswer: i === q.answer }));
    const shuffled = shuffle(optsWithIdx);
    const newAnswer = shuffled.findIndex(x => x.isAnswer);
    return {
      q: q.q,
      options: shuffled.map(x => x.opt),
      answer: newAnswer,
      explanation: q.explanation
    };
  });
}

function updateProgress() {
  const total = state.quiz.length;
  const done = state.answers.filter(a => a !== undefined).length;
  document.getElementById('progressFill').style.width = `${(done/total)*100}%`;
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  const correctNum = state.answers.filter((a, i) => a !== undefined && a === state.quiz[i].answer).length;
  const wrongNum = state.answers.filter((a, i) => a !== undefined && a !== state.quiz[i].answer).length;
  document.getElementById('correctCount').textContent = correctNum;
  document.getElementById('wrongCount').textContent = wrongNum;
}

      <div class="q-num">문제 ${state.idx + 1} / ${total}</div>
      <div class="question">${q.q}</div>
      <div class="options">
        ${q.options.map((opt, i) => {
          let cls = 'option';
          if (answered !== undefined) {
            if (i === q.answer) cls += ' correct';
            else if (i === answered) cls += ' wrong';
          }
          return `<button class="${cls}" data-idx="${i}" ${answered !== undefined ? 'disabled' : ''}>
            <span class="option-label">${labels[i]}</span>
            <span class="option-text">${opt}</span>
          </button>`;
        }).join('')}
      </div>
      ${answered !== undefined && q.explanation ? `
        <div class="explanation"><strong>해설</strong>${q.explanation}</div>
      ` : ''}
      <div class="controls">
        ${state.idx > 0 ? '<button class="btn btn-secondary" id="prevBtn">이전</button>' : ''}
        ${answered !== undefined ? (
          state.idx < total - 1
            ? '<button class="btn btn-primary" id="nextBtn">다음 문제</button>'
            : '<button class="btn btn-primary" id="finishBtn">결과 보기</button>'
        ) : ''}
      </div>
    </div>
  `;

  main.querySelectorAll('.option:not(:disabled)').forEach(btn => {
    btn.addEventListener('click', () => {
      const choice = parseInt(btn.dataset.idx);
      state.answers[state.idx] = choice;
      updateProgress();
      renderQuestion();
    });
  });
  document.getElementById('prevBtn')?.addEventListener('click', () => { state.idx--; renderQuestion(); window.scrollTo({top:0, behavior:'smooth'}); });
  document.getElementById('nextBtn')?.addEventListener('click', () => { state.idx++; renderQuestion(); window.scrollTo({top:0, behavior:'smooth'}); });
  document.getElementById('finishBtn')?.addEventListener('click', renderResult);
}

function renderResult() {
  const total = state.quiz.length;
  const correct = state.answers.filter((a, i) => a === state.quiz[i].answer).length;
  const wrong = total - correct;
  const pct = Math.round((correct/total)*100);
  let msg = '훌륭해요! 시험 준비 잘 되셨네요';
  if (pct < 60) msg = '핵심 포인트 다시 한번 복습해볼까요?';
  else if (pct < 80) msg = '거의 다 왔어요! 헷갈리는 부분만 보완하세요';
  else if (pct < 95) msg = '아주 좋아요! 디테일만 한번 더 점검해보세요';

  main.innerHTML = `
    <div class="card result">
      <div class="result-score">${correct}<span>/${total}</span></div>
      <div class="result-text">정답률 ${pct}% · ${msg}</div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-num correct-num">${correct}</div>
          <div class="result-stat-label">맞은 문제</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-num wrong-num">${wrong}</div>
          <div class="result-stat-label">틀린 문제</div>
        </div>
      </div>
      <div class="controls" style="max-width: 320px; margin: 0 auto; gap: 8px;">
        <button class="btn btn-primary" id="retryBtn">새 문제 다시 풀기</button>
      </div>
      ${wrong > 0 ? `
        <div class="review">
          <h2>틀린 문제 다시 보기</h2>
          ${state.quiz.map((q, i) => {
            const ok = state.answers[i] === q.answer;
            if (ok) return '';
            return `<div class="review-item">
              <div class="rq">${i+1}. ${q.q}</div>
              <div class="ra">정답: ${labels[q.answer]}. ${q.options[q.answer]}</div>
            </div>`;
          }).join('')}
        </div>
      ` : `<div style="margin-top: 24px; color: var(--correct-strong); font-size: 14px; font-weight: 600;">🎉 전부 맞히셨어요!</div>`}
    </div>
  `;
  document.getElementById('retryBtn').addEventListener('click', () => {
    startQuiz();
  });
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = `${total} / ${total}`;
}

renderStart();
</script>
</body>
</html>
