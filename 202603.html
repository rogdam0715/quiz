<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>노인교육론 1~15강 + 기출 랜덤 퀴즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #FAF7F2; --ink: #1A1A1A; --muted: #6B6B6B; --card: #FFFFFF;
    --border: #E8E2D5; --accent: #2E5C4F; --accent-soft: #E8F0EC;
    --correct: #16A34A; --correct-soft: #DCFCE7; --correct-strong: #15803D;
    --wrong: #DC2626; --wrong-soft: #FEE2E2; --wrong-strong: #B91C1C;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
  }
  html, body { background: var(--bg); color: var(--ink); font-family: 'IBM Plex Sans KR', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; overscroll-behavior-y: contain; }
  body { background-image: radial-gradient(circle at 10% 0%, rgba(46,92,79,0.04) 0%, transparent 40%), radial-gradient(circle at 90% 100%, rgba(220,38,38,0.03) 0%, transparent 40%); }
  .app { max-width: 560px; margin: 0 auto; padding: 24px 20px 40px; }
  header { margin-bottom: 24px; }
  .eyebrow { font-family: 'Gowun Dodum', serif; color: var(--accent); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-family: 'Gowun Dodum', serif; font-size: 24px; font-weight: 400; line-height: 1.3; margin-bottom: 8px; }
  .subtitle { color: var(--muted); font-size: 14px; }
  .progress-wrap { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
  .progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }
  .progress-text { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 56px; text-align: right; }
  .score-tracker { display: flex; gap: 8px; margin-top: 12px; font-size: 12px; color: var(--muted); }
  .score-pill { padding: 4px 10px; border-radius: 999px; background: var(--card); border: 1px solid var(--border); font-weight: 600; }
  .score-pill.correct-pill { color: var(--correct-strong); border-color: var(--correct); }
  .score-pill.wrong-pill { color: var(--wrong-strong); border-color: var(--wrong); }
  .feedback-banner { margin-bottom: 16px; padding: 14px 18px; border-radius: 12px; font-weight: 700; font-size: 16px; text-align: center; animation: slideIn 0.3s ease-out; letter-spacing: 0.02em; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .feedback-banner.correct { background: var(--correct); color: white; }
  .feedback-banner.wrong { background: var(--wrong); color: white; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px 20px; box-shadow: var(--shadow); animation: fadeIn 0.35s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .q-num { font-family: 'Gowun Dodum', serif; color: var(--accent); font-size: 13px; letter-spacing: 0.05em; margin-bottom: 12px; }
  .question { font-size: 16px; font-weight: 500; line-height: 1.55; margin-bottom: 20px; word-break: keep-all; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; cursor: pointer; font-family: inherit; font-size: 14.5px; line-height: 1.5; text-align: left; width: 100%; color: var(--ink); transition: all 0.15s ease; word-break: keep-all; position: relative; }
  .option:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-soft); }
  .option:active:not(:disabled) { transform: scale(0.99); }
  .option:disabled { cursor: default; }
  .option-label { flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%; background: var(--card); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--muted); transition: all 0.15s ease; }
  .option-text { flex: 1; }
  .option.correct { background: var(--correct-soft); border-color: var(--correct); border-width: 2.5px; color: var(--correct-strong); font-weight: 600; }
  .option.correct .option-label { background: var(--correct); border-color: var(--correct); color: white; }
  .option.correct .option-text { padding-right: 56px; }
  .option.correct::after { content: '✓ 정답'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--correct); color: white; font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 6px; letter-spacing: 0.02em; }
  .option.wrong { background: var(--wrong-soft); border-color: var(--wrong); border-width: 2.5px; color: var(--wrong-strong); font-weight: 600; }
  .option.wrong .option-label { background: var(--wrong); border-color: var(--wrong); color: white; }
  .option.wrong .option-text { padding-right: 56px; }
  .option.wrong::after { content: '✗ 오답'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--wrong); color: white; font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 6px; letter-spacing: 0.02em; }
  .explanation { margin-top: 16px; padding: 14px 16px; background: var(--accent-soft); border-left: 3px solid var(--accent); border-radius: 8px; font-size: 13.5px; line-height: 1.6; color: var(--ink); animation: fadeIn 0.3s ease-out; }
  .explanation strong { color: var(--accent); display: block; margin-bottom: 4px; font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase; }
  .controls { margin-top: 20px; display: flex; gap: 10px; }
  .btn { flex: 1; padding: 14px 20px; border: none; border-radius: 12px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s ease; }
  .btn-primary { background: var(--ink); color: white; }
  .btn-primary:hover { background: #000; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
  .btn-secondary:hover { border-color: var(--ink); color: var(--ink); }
  .start-screen { text-align: center; padding: 40px 20px; }
  .start-screen h2 { font-family: 'Gowun Dodum', serif; font-weight: 400; font-size: 22px; margin-bottom: 12px; }
  .start-screen p { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
  .start-info { background: var(--accent-soft); border-radius: 12px; padding: 16px; margin-bottom: 20px; font-size: 13.5px; line-height: 1.6; color: var(--ink); text-align: left; }
  .start-info strong { color: var(--accent); }
  .result { text-align: center; padding: 32px 20px; }
  .result-score { font-family: 'Gowun Dodum', serif; font-size: 64px; font-weight: 400; color: var(--accent); line-height: 1; margin-bottom: 8px; }
  .result-score span { font-size: 32px; color: var(--muted); }
  .result-text { font-size: 16px; color: var(--muted); margin-bottom: 16px; }
  .result-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 28px; padding: 16px; background: var(--bg); border-radius: 12px; border: 1px solid var(--border); }
  .result-stat { text-align: center; }
  .result-stat-num { font-family: 'Gowun Dodum', serif; font-size: 32px; font-weight: 400; line-height: 1; margin-bottom: 4px; }
  .result-stat-num.correct-num { color: var(--correct-strong); }
  .result-stat-num.wrong-num { color: var(--wrong-strong); }
  .result-stat-label { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; }
  .review { text-align: left; margin-top: 24px; border-top: 1px solid var(--border); padding-top: 20px; }
  .review h2 { font-family: 'Gowun Dodum', serif; font-weight: 400; font-size: 18px; margin-bottom: 12px; }
  .review-item { padding: 12px 14px; border-radius: 10px; margin-bottom: 8px; font-size: 13.5px; line-height: 1.5; background: var(--bg); border: 1px solid var(--border); border-left: 3px solid var(--wrong); }
  .review-item .rq { font-weight: 500; margin-bottom: 4px; }
  .review-item .ra { color: var(--muted); font-size: 13px; }
  footer { text-align: center; margin-top: 32px; font-size: 12px; color: var(--muted); font-family: 'Gowun Dodum', serif; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow">노인교육론</div>
    <h1 id="title">1~15강 + 기출 기말 대비 퀴즈</h1>
    <div class="subtitle" id="subtitle">요점정리+기출 총 158문제 중 무작위 20문제 출제</div>
    <div class="progress-wrap" id="progressWrap" style="display:none;">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">0 / 20</div>
    </div>
    <div class="score-tracker" id="scoreTracker" style="display:none;">
      <div class="score-pill correct-pill">✓ <span id="correctCount">0</span></div>
      <div class="score-pill wrong-pill">✗ <span id="wrongCount">0</span></div>
    </div>
  </header>
  <main id="main"></main>
  <footer>made with ripo · 학습 퀴즈</footer>
</div>

<script>
const ALL_QUESTIONS = [{"q": "UN 기준 65세 이상 인구 비율이 14% 이상인 사회를 부르는 명칭은?", "options": ["고령화사회(Aging Society)", "고령사회(Aged Society)", "초고령사회(Superaged Society)", "장수사회"], "answer": 1, "explanation": "7% 이상=고령화사회, 14% 이상=고령사회(Aged Society), 20% 이상=초고령사회입니다."}, {"q": "UN 기준 초고령사회(Superaged Society)에 해당하는 65세 이상 인구 비율은?", "options": ["7% 이상", "10% 이상", "14% 이상", "20% 이상"], "answer": 3, "explanation": "20% 이상이면 초고령사회입니다. 우리나라는 2025년 20.6%로 초고령사회 진입이 예상됩니다."}, {"q": "노년부양비를 구하는 공식으로 옳은 것은?", "options": ["(65세 인구 ÷ 15~64세 인구) × 100", "(15~64세 인구 ÷ 65세 인구) × 100", "(65세 인구 ÷ 총인구) × 100", "(0~14세 인구 ÷ 65세 인구) × 100"], "answer": 0, "explanation": "노년부양비 = (65세 인구 ÷ 15~64세 인구) × 100. 생산가능인구 100명이 부양해야 할 65세 인구 수입니다."}, {"q": "우리나라 고령사회의 3대 문제로 강의록이 제시한 것이 아닌 것은?", "options": ["높은 자살률", "빈곤문제", "노년층 내 양극화", "낮은 평균수명"], "answer": 3, "explanation": "고령사회 3대 문제는 높은 자살률, 빈곤문제, 노년층 내 양극화입니다. 평균수명은 오히려 약 31년 연장되었습니다."}, {"q": "노년층 내 양극화와 관련된 '3가지 자본'에 해당하지 않는 것은?", "options": ["경제적 자본", "문화적 자본", "사회적 자본", "정치적 자본"], "answer": 3, "explanation": "3가지 자본은 경제적 자본(재화·경제력), 문화적 자본(교육·지식), 사회적 자본(친목·교제·봉사)입니다."}, {"q": "노인의 지위·역할이 사회의 현대화와 반비례한다고 가정하는 이론은?", "options": ["현대화 이론", "노년초월 이론", "활동 이론", "사회유리 이론"], "answer": 0, "explanation": "현대화 이론은 산업화·도시화로 노인의 가치평가가 낮아지고 비생산적 존재로 여겨진다고 봅니다."}, {"q": "'노년초월(Gerotranscendence)' 개념을 최초로 제기한 학자는?", "options": ["피터 콜만(Coleman)", "캐슬린 피셔(Fischer)", "라스 토른스탐(Tornstam)", "헨리 나우웬(Nouwen)"], "answer": 2, "explanation": "노년초월 개념은 라스 토른스탐이 최초로 제기했습니다."}, {"q": "'수레바퀴' 상징을 통해 나이듦을 새로움이 생성되는 진보의 과정으로 본 인물은?", "options": ["피터 콜만", "캐슬린 피셔", "플루드(Flood)", "헨리 나우웬"], "answer": 3, "explanation": "헨리 나우웬은 '수레바퀴' 상징으로 노년기를 긍정적·창조적 경험의 진보 과정으로 보았습니다."}, {"q": "자아완성(자아통합성) 상태는 노년기에야 비로소 가능하다고 본 학자는?", "options": ["에릭슨(Erikson)", "토른스탐", "플루드", "콜만"], "answer": 0, "explanation": "에릭슨은 자아완성(자아통합성)은 노년기에 비로소 가능하다고 보았습니다."}, {"q": "노인학습자 발달을 위한 평생교육의 기본 관점 3가지에 해당하지 않는 것은?", "options": ["사회·실천적 활동과 결합", "영적 발달 중심의 통합성 증진", "프로그램이 아니라 패러다임", "직업역량 강화 중심"], "answer": 3, "explanation": "기본 관점 3가지는 ①사회·실천적 활동 ②영적 발달 중심 통합성 ③패러다임입니다."}, {"q": "인간이 겪는 노화의 4가지 속성에 해당하지 않는 것은?", "options": ["보편성", "고유성", "점진성", "가역성"], "answer": 3, "explanation": "노화의 4속성은 보편성·고유성·점진성·유해성입니다. 노화는 되돌릴 수 없으므로 '가역성'은 틀립니다."}, {"q": "정상적 노화(1차 노화)에 대한 설명으로 옳은 것은?", "options": ["의학적 원인·병적 증상에 따른 노화", "모든 사람이 경험하는 연령 증가에 따른 퇴화 과정", "심리적·사회적 요인에 의한 노화", "경제적 고통이 촉진하는 노화"], "answer": 1, "explanation": "1차 노화(정상적 노화)는 모든 사람이 경험하는 연령 증가에 따른 퇴화이고, 2차 노화(병리적 노화)는 의학적·심리사회적 원인에 의한 노화입니다."}, {"q": "노인의 생애단계 3단계 중 '일하기 어렵고 노쇠하며 가장 빈곤·외롭고 약한' 단계는?", "options": ["연소 노인(Young-old)", "중고령 노인(Middle-old)", "고령 노인(Old-old)", "초고령 노인"], "answer": 2, "explanation": "고령 노인(Old-old)이 일하기 어렵고 가장 빈곤·외롭고 약한 단계입니다."}, {"q": "뉴가튼(Neugarten) 성격 유형 중 생활만족도가 모든 하위형에서 '높음'으로 나타나는 유형은?", "options": ["통합형", "무장 방어형", "수동적 의존형", "해체형"], "answer": 0, "explanation": "통합형(재구성·집중·이탈)은 생활만족도가 모두 '높음'입니다. 함정은 이탈형이 역할활동은 낮은데 만족도는 높다는 점입니다."}, {"q": "뉴가튼 성격 유형 중 생활만족도가 가장 낮은 유형끼리 묶인 것은?", "options": ["통합형·무장방어형", "해체형·냉담형", "수동적의존형·통합형", "유지형·재구성형"], "answer": 1, "explanation": "해체형과 냉담형(수동적 의존형 하위)이 생활만족도가 낮음~중간으로 가장 낮습니다."}, {"q": "성공적인 노화의 조건 3가지에 해당하지 않는 것은?", "options": ["적절한 신체적 기능과 인지능력", "정서적 평온감", "통합적 자아정체성", "높은 경제적 소득"], "answer": 3, "explanation": "성공적 노화 조건 3가지는 신체·인지 기능, 정서적 평온감, 통합적 자아정체성입니다."}, {"q": "교육학의 세분화에서 '노인 중심, 죽음 앞둔 존재로서 삶의 총체적 의미를 찾는 사색적 탐색 과정'에 해당하는 것은?", "options": ["페다고지(Pedagogy)", "안드라고지(Andragogy)", "제라고지(Geragogy)", "트라이고지(Trigogy)"], "answer": 2, "explanation": "제라고지는 노인 중심으로, 죽음을 앞둔 존재로서 삶의 총체적 의미를 찾는 사색적 탐색 과정입니다."}, {"q": "페다고지+안드라고지+제라고지를 포함하는 제3의 교육학 개념 '트라이고지(Trigogy)'를 제시한 인물은?", "options": ["라벨(Label)", "요(Yoe)", "마쓰이 세이쇼(松井政明)", "페터슨(Peterson)"], "answer": 2, "explanation": "트라이고지는 마쓰이 세이쇼가 제시한 제3의 교육학 개념입니다. 라벨=제라고지, 요=엘더고지."}, {"q": "노인교육을 '노인을 위한 / 노인에 관한 / 노인에 의한' 3세대 교육으로 정의한 학자는?", "options": ["페터슨(Peterson)", "자비스(Jarvis)", "김종서", "한정란"], "answer": 3, "explanation": "한정란(2001)이 노인을 위한·관한·의한 3세대 교육으로 정의했습니다. '우리나라 최초'는 김종서(1984)."}, {"q": "맥클러스키(McClusky)의 '여력에 따른 요구 이론' 5가지 범주에 해당하지 않는 것은?", "options": ["대처의 요구", "표현의 요구", "공헌의 요구", "경쟁의 요구"], "answer": 3, "explanation": "5가지는 대처·표현·공헌·영향력·초월의 요구입니다(대-표-공-영-초). '경쟁의 요구'는 없습니다."}, {"q": "노인교육 4특성 중 '혁신성'을 주장하며 '가장 진보적인 교육'이라 본 학자는?", "options": ["바스(Vath)", "페졸트(Petzold)", "퓔그라프(Fulgraff)", "펠켄(Veelken)"], "answer": 0, "explanation": "혁신성=바스(Vath, 1973), 내적성장=페졸트/페글러, 생산성=퓔그라프, 비판적 의식=펠켄입니다."}, {"q": "노인교육 4특성 중 인본주의 입장에서 직업개발보다 교양 함양·내적 성장을 강조한 학자는?", "options": ["바스(Vath)", "페졸트(Petzold)", "퓔그라프(Fulgraff)", "펠켄(Veelken)"], "answer": 1, "explanation": "페졸트는 노인학습 목표가 인본주의에서 도출됨을 최초로 강조했습니다. (3)생산성=퓔그라프와 입장이 반대입니다."}, {"q": "ADL(일반적 일상생활 수행능력) 6개 항목을 제안한 학자는?", "options": ["Ford Katz 등(1963)", "Lawton & Brody(1969)", "Schaie(1990)", "Neugarten(1968)"], "answer": 0, "explanation": "ADL 6개 항목은 Ford Katz 등(1963), IADL 10개 항목은 Lawton & Brody(1969)가 제안했습니다."}, {"q": "IADL(수단적·도구적 일상생활 수행능력) 10개 항목을 제안한 학자는?", "options": ["Ford Katz 등", "Lawton & Brody", "Hooyman & Kiyak", "Bengston & Schaie"], "answer": 1, "explanation": "IADL 10개 항목(몸단장·집안일·식사준비·빨래·약챙겨먹기 등)은 Lawton & Brody(1969)입니다."}, {"q": "두뇌의 노화에서 '노화에 가장 민감하며 순서 정하기·언어/도형 유창성 손상'과 관련된 부위는?", "options": ["전두엽", "두정엽", "측두엽(해마)", "후두엽"], "answer": 0, "explanation": "전두엽이 노화에 가장 민감합니다. 두정엽은 우측이 더 취약, 측두엽(해마)은 장기 서술기억·회상에 결정적입니다."}, {"q": "벤스톤 & 샤이에(1999)의 지적 능력 절정기 연구에서 종단적 접근과 횡단적 접근의 절정 연령으로 옳은 것은?", "options": ["종단 35세 / 횡단 55세", "종단 55세 / 횡단 35세", "종단 60세 / 횡단 40세", "종단 50세 / 횡단 50세"], "answer": 1, "explanation": "종단적(개인 연대기별)은 55세, 횡단적(같은 연령대 비교)은 35세로 나타났습니다."}, {"q": "노년기 지적 능력에 영향을 미치는 4가지 요인에 해당하지 않는 것은?", "options": ["교육수준", "직업수준", "건강상태", "거주지역"], "answer": 3, "explanation": "4요인은 교육수준·직업수준·건강상태·생활양식입니다."}, {"q": "노년기 기억력에 대한 설명으로 옳은 것은?", "options": ["노화는 저장능력 자체를 손상시킨다", "노화는 저장능력이 아니라 정보처리 과정에 영향을 미친다", "암묵적 기억이 명시적 기억보다 더 많이 떨어진다", "비서술 기억은 '본 것'을 더 오래 기억한다"], "answer": 1, "explanation": "노화는 저장능력이 아니라 정보처리 과정에 영향을 미치며, 지적 활동(독서 등)으로 회복 가능합니다. 명시적 기억이 더 많이 떨어지고, 비서술은 '들은 것'을 더 오래 기억합니다."}, {"q": "노년기 인성의 3가지 증대 경향에 해당하지 않는 것은?", "options": ["내향성 증대", "양성성 증대", "수동성 증대", "외향성 증대"], "answer": 3, "explanation": "노년기 인성은 내향성·양성성·수동성이 증대하는 경향이 있습니다."}, {"q": "창의성의 분야별 정점에 대한 설명으로 옳은 것은?", "options": ["과학은 40~50대, 인문학은 20~30대에 정점", "과학은 20~30대, 인문학은 40~50대에 정점", "두 분야 모두 30세에 정점", "두 분야 모두 50세에 정점"], "answer": 1, "explanation": "Lehman(1953)에 따르면 창의성은 30세 정점이며, 과학은 20~30대(이후 급락), 인문학은 40~50대(이후 미미한 퇴화)에 정점입니다."}, {"q": "에릭슨(Erikson, 1950)이 본 성인 후기(노년기)의 발달과업 대립축은?", "options": ["생산성 vs 침체성", "통합성 vs 절망감", "친밀감 vs 고립감", "근면성 vs 열등감"], "answer": 1, "explanation": "성인 중기는 생산성 vs 침체성, 성인 후기(노년기)는 통합성 vs 절망감입니다."}, {"q": "캡스(Capps, 2012)의 3단계 중 '90대~죽음' 단계의 대립축과 미덕으로 옳은 것은?", "options": ["통합 vs 절망/혐오 — 통합", "방기 vs 통제 — 우아함", "생존욕망 vs 분투 — 희망(인내)", "친밀 vs 고립 — 사랑"], "answer": 2, "explanation": "캡스 3단계: ~70세(통합vs절망·혐오), 80대(방기vs통제→우아함), 90대~죽음(생존욕망vs분투→인내→희망)."}, {"q": "노년기의 전생애발달적 특성 4가지에 해당하지 않는 것은?", "options": ["발달의 계속성", "뇌가소성", "역사적·사회적 맥락의 중요성", "발달의 일방향성"], "answer": 3, "explanation": "4가지 특성은 발달의 계속성·뇌가소성·역사적사회적 맥락·개인차입니다. 발달은 일방향이 아니라 다양한 차원에서 일어납니다."}, {"q": "'뇌가 환경에 적응해 스스로 기능적 구조를 변화시키는 능력'인 뇌가소성을 정의한 학자는?", "options": ["Diamond(1988)", "한정란(2005)", "Neumann(1994)", "Veelken(2000a)"], "answer": 0, "explanation": "뇌가소성은 Diamond(1988)가 정의했습니다. 회복 가소성과 적응 가소성 2종류가 있습니다."}, {"q": "노인학습자 4유형 중 '삶의 이야기 속 성찰을 통해 학습하며 생애사적 자서전을 작성'하는 유형은?", "options": ["적극적 행위자", "문화창조자", "배려-봉사자", "생애사 연구자"], "answer": 3, "explanation": "생애사 연구자는 삶의 이야기 속 성찰을 통해 학습하며 정체성 찾기가 절실한 유형입니다."}, {"q": "노인교육의 '실패자 모델'과 '성공인 모델'에 대한 설명으로 옳은 것은?", "options": ["성공인 모델은 노인을 의존적·나약한 존재로 본다", "한국의 노인교육은 대개 '실패자 모델'에 기반한다", "실패자 모델은 인적자원개발에 초점을 둔다", "성공인 모델은 복지서비스의 일환으로 본다"], "answer": 1, "explanation": "한국 노인교육은 대개 노인을 의존적·나약한 존재로 보는 '실패자 모델'에 기반합니다. 성공인 모델은 인적자원개발에 초점을 둡니다."}, {"q": "'젊은 환경제공 실험'으로 환경에 따라 노인 학습능력이 향상될 수 있음을 증명한 학자는?", "options": ["슐렌베르크(Schulenberg)", "엘렌 랭어(Langer)", "아널드(Arnold)", "튜스(Tews)"], "answer": 1, "explanation": "엘렌 랭어(Langer, 2011)는 '젊은 환경제공 실험'으로 환경에 따른 노인 학습능력 향상을 증명했습니다."}, {"q": "노인의 활력화(Empowerment)에 대한 설명으로 가장 적절한 것은?", "options": ["노인에게 지식·정보를 일방적으로 전달하는 과정", "노인 자신이 사회적으로 구성된 존재임을 깨닫고 부정→긍정 이미지로 자신을 새롭게 규정하는 과정", "노인을 장애 극복의 대상으로 보는 관점", "복지서비스 수혜자로 노인을 규정하는 것"], "answer": 1, "explanation": "활력화는 노인이 사회적으로 구성된 존재임을 깨닫고 인생을 재의미화하여 부정→긍정 이미지로 자신을 새롭게 규정하는 과정입니다."}, {"q": "비판적 노년학 담론에서 교수자에게 요구되는 역할로 옳은 것은?", "options": ["지식 전달자", "변혁가·조직가·동조자", "관리·감독자", "복지서비스 제공자"], "answer": 1, "explanation": "노인을 학습 주체로 보고, 교수자는 지식 전달자가 아니라 변혁가·조직가·동조자 역할을 합니다."}, {"q": "이지혜(2003)의 '문해력' 개념 변화 4단계를 순서대로 옳게 나열한 것은?", "options": ["서명→읊기→이해→분석추론", "읊기→서명→이해→분석추론", "이해→서명→읊기→분석추론", "서명→이해→읊기→분석추론"], "answer": 0, "explanation": "문해력 개념은 서명(Signature)→읊기(Recitation)→이해(Comprehension)→분석추론(Analysis) 순으로 변화했습니다."}, {"q": "'사회적 맥락 안에서 글을 이해하고 사용할 수 있는 능력'을 가리키는 것은?", "options": ["최소 문해력", "기능적 문해력", "디지털 문해력", "미디어 문해력"], "answer": 1, "explanation": "기능적 문해력은 사회적 맥락 안에서 글을 이해·사용하는 능력이고, 최소 문해력은 기초적 읽기·쓰기 능력입니다. 기능적 문해 정의는 UNESCO(1956)."}, {"q": "'태어날 때부터 디지털 기기에 둘러싸여 성장한 세대'를 가리키는 마크 프렌스키의 용어는?", "options": ["디지털 원주민", "디지털 이주민", "디지털 난민", "디지털 세대"], "answer": 0, "explanation": "마크 프렌스키(Marc Prensky)의 디지털 원주민(기성세대 자녀) vs 디지털 이주민(기성세대) 구분입니다."}, {"q": "유네스코 21세기 학습의 네 기둥 중 노인 문해교육과 가장 근접한 것은?", "options": ["앎을 위한 학습(learning to know)", "행하기 위한 학습(learning to do)", "존재하기 위한 학습(learning to be)", "함께 살아가기 위한 학습(learning to live together)"], "answer": 2, "explanation": "문해교육은 네 기둥 모두에 해당하나 그중 '존재하기 위한 학습(learning to be)'에 가장 근접합니다."}, {"q": "세계 문해의 날(International Literacy Day)에 대한 설명으로 옳은 것은?", "options": ["9월 8일, 1966년 유네스코가 지정", "10월 9일, 1948년 UN이 지정", "9월 8일, 2015년 SDGs로 지정", "4월 23일, 1995년 유네스코가 지정"], "answer": 0, "explanation": "세계 문해의 날은 9월 8일이며 1966년 유네스코가 지정했습니다."}, {"q": "2021년 제3차 성인문해능력조사 결과 수준 1(약 200만 명) 인구 비율은?", "options": ["4.5%", "11.4%", "20.2%", "79.8%"], "answer": 0, "explanation": "수준 1 인구는 4.5%(약 200만 명), 수준 1~3 인구는 20.2%(약 889만 명)입니다."}, {"q": "문해능력이 낮게 나타나는 경향에 대한 설명으로 옳지 않은 것은?", "options": ["연령이 높을수록 낮다", "월 가구소득이 높을수 으로 운영되는 국가기관이다", "회원이 강사이자 학습자인 회비 기반 자조모임이다", "대학 캠퍼스에서 교수가 강의하는 프랑스형만 존재한다", "30대 이상 청년을 대상으로 한다"], "answer": 1, "explanation": "영국형 U3A는 회원이 강사이자 학습자인, 정부 지원 없이 회비로 운영되는 자조모임(영국 전역 약 840개, 약 30만 명)입니다."}, {"q": "미국의 '로드 스칼라(Road Scholar)' 여행 프로그램의 초기 명칭은?", "options": ["엘더호스텔(Elderhostel)", "시니어 플래닛", "앙코르 펠로우십", "U3A"], "answer": 0, "explanation": "로드 스칼라의 초기 명칭은 '엘더호스텔(Elderhostel)'이며, 1985년부터 '손자녀와 함께하는 여행'(세대 통합형)을 시도했습니다."}, {"q": "우리나라 〈국민여가활성화기본법〉이 제정된 해는?", "options": ["2005년", "2013년", "2015년", "2020년"], "answer": 2, "explanation": "〈국민여가활성화기본법〉은 2015년 제정되었습니다."}, {"q": "'성별이 가져오는 사회문화적 영향에 주목하는 시민들의 인식'을 가리키는 용어는?", "options": ["성(sex)", "젠더(gender)", "성인지(gender awareness)", "성인지적 관점"], "answer": 2, "explanation": "성인지(gender awareness)는 성별의 사회문화적 영향에 주목하는 시민의 인식입니다. 젠더는 사회문화적 성, 성(sex)은 생물학적 성입니다."}, {"q": "UN 지속가능발전목표(SDGs) 17개 중 5번째 목표는?", "options": ["양질의 교육", "성평등(gender equality)", "빈곤 종식", "건강과 웰빙"], "answer": 1, "explanation": "SDGs 5번째 목표는 성평등입니다. (4번이 양질의 교육)"}, {"q": "노년학(gerontology)의 어원 'geron'의 의미는?", "options": ["늙은 여자", "늙은 남자", "지혜로운 자", "노쇠한 자"], "answer": 1, "explanation": "'geron'은 그리스어로 '늙은 남자'를 뜻하며, 학문 명칭부터 남성성을 띤다는 비판(Cruikshank, 2016)이 있습니다."}, {"q": "여성노인과 남성노인의 문제로 옳게 짝지은 것은?", "options": ["여성노인=고독사 / 남성노인=빈곤", "여성노인=빈곤 / 남성노인=고독사", "여성노인=관계 단절 / 남성노인=재산축적 결여", "여성노인=고립 / 남성노인=경력단절"], "answer": 1, "explanation": "여성노인은 경력단절·재산축적 결여로 빈곤(기초생활수급자 64.6%), 남성노인은 사회참여 고립으로 고독사가 압도적으로 많습니다."}, {"q": "흑인여성 차별을 '상호교차성(intersectionality)'으로 설명한 학자는?", "options": ["크렌쇼(Crenshaw)", "크룩섕크(Cruikshank)", "길리건(Gilligan)", "워커(Walker)"], "answer": 0, "explanation": "크렌쇼(Crenshaw)가 상호교차성 개념을 제시했습니다. 여성노인은 '여성'+'노인' 교차점의 불평등을 겪습니다."}, {"q": "성희롱 3유형에 해당하지 않는 것은?", "options": ["언어적 성희롱", "시각적 성희롱", "육체적 성희롱", "심리적 성희롱"], "answer": 3, "explanation": "성희롱 3유형은 언어적·시각적·육체적입니다. 육체적 성희롱은 행위자 의도와 무관하게 피해자의 불쾌감으로 성립 여부가 결정됩니다."}, {"q": "국가성평등지수(여성가족부, 2022)의 구성으로 옳은 것은?", "options": ["2영역 / 6분야 / 20지표", "3영역 / 8분야 / 25지표", "4영역 / 10분야 / 30지표", "5영역 / 12분야 / 25지표"], "answer": 1, "explanation": "국가성평등지수는 3개 영역 / 8개 분야 / 25개 지표로 구성됩니다."}, {"q": "노인 대상 성인지 교육의 노인교육 3대 과제 중 '첫째'에 해당하는 것은?", "options": ["젠더 관점을 노년교육에 적용(성별 통계 산출이 핵심)", "성별 불평등 해소 교육 프로그램 마련", "노인교육 전문가 양성", "성희롱 예방교육 의무화"], "answer": 0, "explanation": "3대 과제는 첫째(성별 통계 산출), 둘째(구체적 교육 프로그램), 셋째(전문가 양성)입니다."}, {"q": "로우와 칸(Rowe & Kahn, 1987)이 제시한 '성공적 노화'의 세 측면에 해당하지 않는 것은?", "options": ["생물학적 측면", "심리적 측면", "사회적 측면", "경제적 측면"], "answer": 3, "explanation": "로우와 칸의 성공적 노화는 생물학적·심리적·사회적 세 측면을 '모두' 갖출 때 성립합니다."}, {"q": "UNECE 액티브 에이징 지표(2014)의 4개 영역에서 '평생학습'이 속하는 영역은?", "options": ["고용", "사회참여", "독립생활과 보건 및 안전", "역량 및 환경"], "answer": 2, "explanation": "'평생학습'은 독립생활·보건·안전 영역, '교육기회'는 역량·환경 영역입니다(혼동 주의)."}, {"q": "질병을 '실패한 노화'로 보는 '질병 프리즘(prism of illness)'에서 벗어나야 한다고 비판한 학자는?", "options": ["로우와 칸", "크룩섕크(Cruikshank)", "간디", "허수정"], "answer": 1, "explanation": "크룩섕크(Cruikshank, 2016)가 질병 프리즘을 비판했습니다."}, {"q": "2020년 기준 우리나라 기대수명과 건강수명의 격차로 옳은 것은?", "options": ["약 6년", "약 12년", "약 17.2년", "약 31년"], "answer": 2, "explanation": "2020년 기대수명 83.5세, 건강수명 66.3세로 약 17.2년 격차입니다."}, {"q": "노인(65~79세)의 평생교육 참여율(2022)에 대한 설명으로 옳은 것은?", "options": ["전 세대 중 가장 높다", "성인 전체(28.5%)보다 높다", "17.6%로 전 세대 중 가장 낮으나 지속 참여율은 높다", "모든 노인이 적극적으로 참여한다"], "answer": 2, "explanation": "노인 평생교육 참여율은 17.6%로 전 세대 최저이나, '교육받는 사람만 계속 받는' 구조로 지속 참여율은 높습니다."}, {"q": "싱가포르 제3기 위원회(C3A, 2007)의 3가지 주요 분야에 해당하지 않는 것은?", "options": ["국가실버아카데미(NSA) 운영", "노인 자원봉사활동 장려", "긍정적 노화(positive ageing) 장려", "노인 의료보험 운영"], "answer": 3, "explanation": "C3A 3분야는 NSA 운영, 자원봉사 장려, 긍정적 노화(노년학습 안내서 Geragogy Guidelines 개발)입니다."}, {"q": "치매노인 가족 지원 '헤아림' 프로그램(중앙치매센터, 2015)의 3 Part 구성에 해당하지 않는 것은?", "options": ["치매 알기", "돌보는 지혜", "알짜 정보", "재정 관리"], "answer": 3, "explanation": "헤아림 3 Part는 '치매 알기', '돌보는 지혜', '알짜 정보'입니다."}, {"q": "재가 노인 돌봄 수요 증가와 관련해 '살고 있는 지역에서 나이 들기'를 의미하는 용어는?", "options": ["active ageing", "ageing in place", "positive ageing", "successful ageing"], "answer": 1, "explanation": "'살고 있는 지역에서 나이 들기'는 ageing in place입니다."}, {"q": "죽음의 의학적 판정 학설 중 우리나라가 채택하고 있는 것은?", "options": ["뇌사설", "심폐기능설", "사회사설", "법적사설"], "answer": 1, "explanation": "우리나라는 심장이 멈춤을 기준으로 하는 심폐기능설을 채택하고 있습니다."}, {"q": "죽음의 특성 3가지에 해당하지 않는 것은?", "options": ["불가역성", "평등성", "불가지성", "보편성"], "answer": 3, "explanation": "죽음의 특성 3가지는 불가역성·평등성·불가지성입니다."}, {"q": "노년기의 가장 큰 과제를 '노화와 죽음에 직면'하는 것이라 본 인물은?", "options": ["융(Jung)", "에릭슨(Erikson)", "퀴블러 로스", "코르(Corr)"], "answer": 0, "explanation": "융(Jung)은 노년기 가장 큰 과제를 노화와 죽음에 직면하는 것으로 보았고, 에릭슨은 인생을 수용하며 죽음을 준비하는 것을 발달과업으로 보았습니다."}, {"q": "코르(Corr, 2016)의 죽음준비교육 4가지 차원에 해당하지 않는 것은?", "options": ["인지적 활동", "감정적 활동", "행동적 활동", "경제적 활동"], "answer": 3, "explanation": "코르의 4차원은 인지적·감정적·행동적·가치적 활동입니다."}, {"q": "죽음준비교육의 대상 3가지에 해당하지 않는 것은?", "options": ["죽음을 준비하는 당사자(노인 자신)", "죽음을 준비하는 노인의 가족", "죽음을 자주 접하는 직종의 전문가", "죽음을 경험한 일반 시민"], "answer": 3, "explanation": "대상 3가지는 당사자(노인)·가족·직종 전문가(의료인·종교인·요양보호사 등)입니다."}, {"q": "「고독사 예방 및 관리에 관한 법률」(고독사예방법)이 제정·시행된 해는?", "options": ["2018년", "2019년", "2020년", "2016년"], "answer": 2, "explanation": "고독사예방법은 2020년 제정·시행되었습니다. 고독사 비중 1위는 50~60대입니다."}, {"q": "존엄사와 안락사의 구분으로 옳은 것은?", "options": ["존엄사=약물 투입으로 생을 마감 / 안락사=연명치료 중단", "존엄사=연명치료 중단 / 안락사=약물 투입 등 인위적 생 마감", "둘 다 약물 투입을 의미", "둘 다 연명치료 중단을 의미"], "answer": 1, "explanation": "존엄사는 임종과정 환자의 연명치료 중단, 안락사는 약물 투입 등으로 인위적으로 생을 마감하는 것입니다."}, {"q": "연명의료결정제도 타임라인에서 '우리나라 최초로 존엄사 개념을 인정'한 사건은?", "options": ["보라매 병원 사건(1997)", "김 할머니 사건(2009)", "연명의료결정법 제정(2016)", "연명의료결정제도 시행(2018)"], "answer": 1, "explanation": "김 할머니 사건(2009)이 우리나라 최초로 존엄사 개념을 인정한 사건입니다."}, {"q": "죽음준비 문화 확산 관련 '웰다잉문화운동'이 출범한 해는?", "options": ["2015년", "2017년", "2019년", "2020년"], "answer": 2, "explanation": "웰다잉문화운동은 2019년 출범했습니다. 노인이 해야 할 세 가지 마무리(육체적·사회적·정신물질적)도 함께 출제됩니다."}, {"q": "노인교육방법 9가지 원리 중 '노인은 인생에서 개인차가 가장 큰 시기'라는 점을 강조하는 원리는?", "options": ["자발성의 원리", "개별화의 원리", "경험의 원리", "사회화의 원리"], "answer": 1, "explanation": "개별화의 원리는 노년기가 개인차가 가장 큰 시기임을 강조하며, 개개인의 욕구 충족을 중시합니다."}, {"q": "노인교육방법 9가지 원리 중 '교사와 학습자가 계획·진행·평가 const QUIZ_SIZE = 20;

// Fisher-Yates shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 문제 선정 + 각 문제의 보기도 셔플 (정답 위치 랜덤화)
function prepareQuiz() {
  const picked = shuffle(ALL_QUESTIONS).slice(0, QUIZ_SIZE);
  return picked.map(q => {
    const optsWithIdx = q.options.map((opt, i) => ({ opt, isAnswer: i === q.answer }));
    const shuffled = shuffle(optsWithIdx);
    const newAnswer = shuffled.findIndex(x => x.isAnswer);
    return {
      q: q.q,
      options: shuffled.map(x => x.opt),
      answer: newAnswer,
      explanation: q.explanation
    };
  });
}

      </div>
      <div class="controls" style="max-width: 280px; margin: 0 auto;">
        <button class="btn btn-primary" id="startBtn">시작하기</button>
      </div>
    </div>
  `;
  document.getElementById('startBtn').addEventListener('click', startQuiz);
}

function startQuiz() {
  state.quiz = prepareQuiz();
  state.idx = 0;
  state.answers = [];
  state.started = true;
  document.getElementById('progressWrap').style.display = 'flex';
  document.getElementById('scoreTracker').style.display = 'flex';
  updateProgress();
  renderQuestion();
  window.scrollTo({top:0, behavior:'smooth'});
}

function updateProgress() {
  const total = state.quiz.length;
  const done = state.answers.filter(a => a !== undefined).length;
  document.getElementById('progressFill').style.width = `${(done/total)*100}%`;
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  const correctNum = state.answers.filter((a, i) => a !== undefined && a === state.quiz[i].answer).length;
  const wrongNum = state.answers.filter((a, i) => a !== undefined && a !== state.quiz[i].answer).length;
  document.getElementById('correctCount').textContent = correctNum;
  document.getElementById('wrongCount').textContent = wrongNum;
}

function renderQuestion() {
  const q = state.quiz[state.idx];
  const total = state.quiz.length;
  const answered = state.answers[state.idx];
  const isCorrect = answered === q.answer;

  main.innerHTML = `
    ${answered !== undefined ? `
      <div class="feedback-banner ${isCorrect ? 'correct' : 'wrong'}">
        ${isCorrect ? '🎉 맞았어요!' : '❌ 틀렸어요'}
      </div>
    ` : ''}
    <div class="card">
      <div class="q-num">문제 ${state.idx + 1} / ${total}</div>
      <div class="question">${q.q}</div>
      <div class="options">
        ${q.options.map((opt, i) => {
          let cls = 'option';
          if (answered !== undefined) {
            if (i === q.answer) cls += ' correct';
            else if (i === answered) cls += ' wrong';
          }
          return `<button class="${cls}" data-idx="${i}" ${answered !== undefined ? 'disabled' : ''}>
            <span class="option-label">${labels[i]}</span>
            <span class="option-text">${opt}</span>
          </button>`;
        }).join('')}
      </div>
      ${answered !== undefined && q.explanation ? `
        <div class="explanation"><strong>해설</strong>${q.explanation}</div>
      ` : ''}
      <div class="controls">
        ${state.idx > 0 ? '<button class="btn btn-secondary" id="prevBtn">이전</button>' : ''}
        ${answered !== undefined ? (
          state.idx < total - 1
            ? '<button class="btn btn-primary" id="nextBtn">다음 문제</button>'
            : '<button class="btn btn-primary" id="finishBtn">결과 보기</button>'
        ) : ''}
      </div>
    </div>
  `;

  main.querySelectorAll('.option:not(:disabled)').forEach(btn => {
    btn.addEventListener('click', () => {
      const choice = parseInt(btn.dataset.idx);
      state.answers[state.idx] = choice;
      updateProgress();
      renderQuestion();
    });
  });
  document.getElementById('prevBtn')?.addEventListener('click', () => { state.idx--; renderQuestion(); window.scrollTo({top:0, behavior:'smooth'}); });
  document.getElementById('nextBtn')?.addEventListener('click', () => { state.idx++; renderQuestion(); window.scrollTo({top:0, behavior:'smooth'}); });
  document.getElementById('finishBtn')?.addEventListener('click', renderResult);
}

function renderResult() {
  const total = state.quiz.length;
  const correct = state.answers.filter((a, i) => a === state.quiz[i].answer).length;
  const wrong = total - correct;
  const pct = Math.round((correct/total)*100);
  let msg = '훌륭해요! 시험 준비 잘 되셨네요';
  if (pct < 60) msg = '핵심 포인트 다시 한번 복습해볼까요?';
  else if (pct < 80) msg = '거의 다 왔어요! 헷갈리는 부분만 보완하세요';
  else if (pct < 95) msg = '아주 좋아요! 디테일만 한번 더 점검해보세요';

  main.innerHTML = `
    <div class="card result">
      <div class="result-score">${correct}<span>/${total}</span></div>
      <div class="result-text">정답률 ${pct}% · ${msg}</div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-num correct-num">${correct}</div>
          <div class="result-stat-label">맞은 문제</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-num wrong-num">${wrong}</div>
          <div class="result-stat-label">틀린 문제</div>
        </div>
      </div>
      <div class="controls" style="max-width: 320px; margin: 0 auto; gap: 8px;">
        <button class="btn btn-primary" id="retryBtn">새 문제 다시 풀기</button>
      </div>
      ${wrong > 0 ? `
        <div class="review">
          <h2>틀린 문제 다시 보기</h2>
          ${state.quiz.map((q, i) => {
            const ok = state.answers[i] === q.answer;
            if (ok) return '';
            return `<div class="review-item">
              <div class="rq">${i+1}. ${q.q}</div>
              <div class="ra">정답: ${labels[q.answer]}. ${q.options[q.answer]}</div>
            </div>`;
          }).join('')}
        </div>
      ` : `<div style="margin-top: 24px; color: var(--correct-strong); font-size: 14px; font-weight: 600;">🎉 전부 맞히셨어요!</div>`}
    </div>
  `;
  document.getElementById('retryBtn').addEventListener('click', () => {
    startQuiz();
  });
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = `${total} / ${total}`;
}

renderStart();
</script>
</body>
</html>
